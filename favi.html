<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Favicon Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone {
            transition: all 0.3s ease;
            border: 2px dashed #cbd5e1;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-3xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-4">Favicon Generator</h1>
            <p class="text-lg text-slate-600">Convert any image into a multi-layer <span class="font-mono bg-slate-200 px-1 rounded">favicon.ico</span></p>
        </header>

        <main class="bg-white rounded-2xl shadow-xl p-8">
            <!-- Upload Area -->
            <div id="dropZone" class="drop-zone rounded-xl p-12 text-center cursor-pointer mb-8">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <div id="uploadPrompt">
                    <div class="mb-4">
                        <svg class="mx-auto h-12 w-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="C4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <p class="text-slate-600">Click to upload or drag and drop your image</p>
                </div>
                <div id="previewArea" class="hidden flex flex-col items-center">
                    <img id="imgPreview" class="max-h-48 rounded shadow-sm mb-4" src="" alt="Preview">
                    <p id="fileName" class="text-sm font-medium text-slate-700"></p>
                </div>
            </div>

            <!-- Action Area -->
            <div id="actionArea" class="hidden">
                <div class="bg-slate-50 p-6 rounded-xl mb-6">
                    <h3 class="text-sm font-bold text-slate-500 uppercase mb-4 tracking-widest">Generated Layers</h3>
                    <div class="grid grid-cols-3 gap-4 mb-8">
                        <div class="bg-white p-4 rounded-lg border border-slate-200 text-center">
                            <div class="flex justify-center items-center h-16 mb-2">
                                <div id="preview16" class="w-[16px] h-[16px] bg-contain bg-no-repeat bg-center border border-slate-100"></div>
                            </div>
                            <p class="text-xs font-bold">16 × 16</p>
                            <p class="text-[10px] text-slate-400">Standard Tab</p>
                        </div>
                        <div class="bg-white p-4 rounded-lg border border-slate-200 text-center">
                            <div class="flex justify-center items-center h-16 mb-2">
                                <div id="preview32" class="w-[32px] h-[32px] bg-contain bg-no-repeat bg-center border border-slate-100"></div>
                            </div>
                            <p class="text-xs font-bold">32 × 32</p>
                            <p class="text-[10px] text-slate-400">Taskbar/Desktop</p>
                        </div>
                        <div class="bg-white p-4 rounded-lg border border-slate-200 text-center">
                            <div class="flex justify-center items-center h-16 mb-2">
                                <div id="preview48" class="w-[48px] h-[48px] bg-contain bg-no-repeat bg-center border border-slate-100"></div>
                            </div>
                            <p class="text-xs font-bold">48 × 48</p>
                            <p class="text-[10px] text-slate-400">Large Icons</p>
                        </div>
                    </div>
                    
                    <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="C4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download favicon.ico (3 Layers)
                    </button>
                </div>
                
                <div id="fileInfo" class="text-center text-xs text-slate-400 italic">
                    All processing is done locally. No images leave your browser.
                </div>
            </div>
        </main>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const imgPreview = document.getElementById('imgPreview');
        const actionArea = document.getElementById('actionArea');
        const generateBtn = document.getElementById('generateBtn');

        let sourceImage = null;

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    sourceImage = img;
                    imgPreview.src = e.target.result;
                    uploadPrompt.classList.add('hidden');
                    previewArea.classList.remove('hidden');
                    actionArea.classList.remove('hidden');
                    document.getElementById('fileName').textContent = file.name;
                    
                    ['preview16', 'preview32', 'preview48'].forEach(id => {
                        document.getElementById(id).style.backgroundImage = `url(${e.target.result})`;
                    });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        generateBtn.onclick = async () => {
            if (!sourceImage) return;

            const sizes = [16, 32, 48];
            // We use standard sizes. In the ICO header, 0 represents 256px, 
            // but for 16, 32, 48 we use the actual numbers.
            const pngBlobs = await Promise.all(sizes.map(size => createPngBuffer(sourceImage, size)));
            
            const icoBuffer = createIcoFromPngs(pngBlobs, sizes);
            const blob = new Blob([icoBuffer], { type: 'image/x-icon' });
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'favicon.ico';
            a.click();
        };

        function createPngBuffer(img, size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, size, size);
            
            return new Promise(resolve => {
                canvas.toBlob(blob => blob.arrayBuffer().then(resolve), 'image/png');
            });
        }

        function createIcoFromPngs(pngBuffers, sizes) {
            const count = pngBuffers.length;
            const ICONDIR_SIZE = 6;
            const ICONDIRENTRY_SIZE = 16;
            const dirSize = ICONDIR_SIZE + (ICONDIRENTRY_SIZE * count);
            
            let totalSize = dirSize;
            pngBuffers.forEach(buf => totalSize += buf.byteLength);
            
            const buffer = new ArrayBuffer(totalSize);
            const view = new DataView(buffer);
            
            // ICONDIR: Reserved(0), Type(1 for ICO), Count
            view.setUint16(0, 0, true);
            view.setUint16(2, 1, true);
            view.setUint16(4, count, true);
            
            let currentDataOffset = dirSize;
            
            pngBuffers.forEach((buf, i) => {
                const size = sizes[i];
                const entryOffset = ICONDIR_SIZE + (i * ICONDIRENTRY_SIZE);
                
                // ICONDIRENTRY
                // Width/Height: use 0 if size >= 256
                view.setUint8(entryOffset + 0, size >= 256 ? 0 : size);
                view.setUint8(entryOffset + 1, size >= 256 ? 0 : size);
                view.setUint8(entryOffset + 2, 0); // Palette
                view.setUint8(entryOffset + 3, 0); // Reserved
                view.setUint16(entryOffset + 4, 1, true); // Planes
                view.setUint16(entryOffset + 6, 32, true); // BPP
                view.setUint32(entryOffset + 8, buf.byteLength, true); // Size of data
                view.setUint32(entryOffset + 12, currentDataOffset, true); // Offset to data
                
                // Copy PNG data into main buffer
                new Uint8Array(buffer, currentDataOffset, buf.byteLength).set(new Uint8Array(buf));
                currentDataOffset += buf.byteLength;
            });
            
            return buffer;
        }
    </script>
</body>
</html>
