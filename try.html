<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Human Figure Animator - Video Export</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #1a1a1a; color: white; }
        canvas { display: block; }
        .control-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 300px;
            max-height: calc(100vh - 40px);
            background: rgba(30, 30, 30, 0.9);
            padding: 20px;
            border-radius: 12px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        .slider-group { margin-bottom: 15px; }
        input[type=range] { width: 100%; accent-color: #3b82f6; }
        label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: #aaa; }
        .btn {
            background: #3b82f6;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            display: block;
            margin-bottom: 8px;
            border: none;
            width: 100%;
            font-weight: 600;
        }
        .btn:hover { background: #2563eb; }
        .btn:disabled { background: #4b5563; cursor: not-allowed; opacity: 0.6; }
        .btn-secondary { background: #4b5563; }
        .btn-secondary:hover { background: #374151; }
        
        #recording-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            z-index: 100;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        #message-box {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="recording-overlay">
        <div class="w-3 h-3 bg-white rounded-full"></div>
        RECORDING...
    </div>

    <div class="control-panel" id="ui">
        <h2 class="text-xl font-bold mb-4">Human Animator</h2>
        
        <div class="mb-6">
            <p class="text-xs uppercase tracking-widest text-blue-400 font-semibold mb-2">Export Animation</p>
            <button id="recordBtn" class="btn bg-red-600 hover:bg-red-700" onclick="recordVideo()">
                Record 5s Video (.webm)
            </button>
            <button class="btn btn-secondary text-sm" onclick="takeSnapshot()">Save PNG Frame</button>
        </div>

        <div class="mb-6">
            <p class="text-xs uppercase tracking-widest text-blue-400 font-semibold mb-2">Preset Actions</p>
            <button class="btn btn-secondary" onclick="setAnimation('idle')">Idle Breath</button>
            <button class="btn btn-secondary" onclick="setAnimation('wave')">Wave Hand</button>
            <button class="btn btn-secondary" onclick="setAnimation('walk')">Walk Cycle</button>
            <button class="btn bg-gray-700" onclick="setAnimation('reset')">Reset Pose</button>
        </div>

        <div class="mb-6">
            <p class="text-xs uppercase tracking-widest text-blue-400 font-semibold mb-2">Body Customization</p>
            <div class="slider-group">
                <label>Skin Tone</label>
                <input type="color" id="skinColor" value="#ffdbac" class="w-full h-8 rounded mb-2 cursor-pointer">
            </div>
            <div class="slider-group">
                <label>Height</label>
                <input type="range" id="bodyScale" min="0.8" max="1.2" step="0.01" value="1">
            </div>
            <div class="slider-group">
                <label>Shoulder Width</label>
                <input type="range" id="shoulderWidth" min="0.5" max="1.5" step="0.01" value="1">
            </div>
        </div>

        <div class="mb-6">
            <p class="text-xs uppercase tracking-widest text-blue-400 font-semibold mb-2">Manual Joint Control</p>
            <div class="slider-group">
                <label>Arm Rotation (Left)</label>
                <input type="range" id="lArmRot" min="-1.5" max="1.5" step="0.01" value="0">
            </div>
            <div class="slider-group">
                <label>Arm Rotation (Right)</label>
                <input type="range" id="rArmRot" min="-1.5" max="1.5" step="0.01" value="0">
            </div>
        </div>
        
        <p class="text-[10px] text-gray-500 mt-4 text-center">Drag to rotate • Scroll to zoom</p>
    </div>

    <div id="message-box"></div>

    <script>
        let scene, camera, renderer, mannequin, clock;
        let joints = {};
        let currentAnim = 'idle';
        let isRecording = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                preserveDrawingBuffer: true,
                alpha: false 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Ground
            const grid = new THREE.GridHelper(20, 20, 0x333333, 0x222222);
            scene.add(grid);

            createMannequin();
            setupControls();
            animate();
        }

        function createBox(w, h, d, color = 0xdddddd) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            return mesh;
        }

        function createMannequin() {
            mannequin = new THREE.Group();
            const skin = document.getElementById('skinColor').value;

            const hips = createBox(0.3, 0.2, 0.15, skin);
            hips.position.y = 1;
            mannequin.add(hips);
            joints.hips = hips;

            const torso = createBox(0.35, 0.45, 0.2, skin);
            torso.position.y = 0.35;
            hips.add(torso);
            joints.torso = torso;

            const head = createBox(0.2, 0.25, 0.2, skin);
            head.position.y = 0.4;
            torso.add(head);
            joints.head = head;

            const lShoulder = new THREE.Group();
            lShoulder.position.set(-0.22, 0.2, 0);
            torso.add(lShoulder);
            const lArm = createBox(0.1, 0.4, 0.1, skin);
            lArm.position.y = -0.2;
            lShoulder.add(lArm);
            joints.lArm = lShoulder;

            const rShoulder = new THREE.Group();
            rShoulder.position.set(0.22, 0.2, 0);
            torso.add(rShoulder);
            const rArm = createBox(0.1, 0.4, 0.1, skin);
            rArm.position.y = -0.2;
            rShoulder.add(rArm);
            joints.rArm = rShoulder;

            const lHipJoint = new THREE.Group();
            lHipJoint.position.set(-0.1, -0.1, 0);
            hips.add(lHipJoint);
            const lLeg = createBox(0.12, 0.5, 0.12, skin);
            lLeg.position.y = -0.25;
            lHipJoint.add(lLeg);
            joints.lLeg = lHipJoint;

            const rHipJoint = new THREE.Group();
            rHipJoint.position.set(0.1, -0.1, 0);
            hips.add(rHipJoint);
            const rLeg = createBox(0.12, 0.5, 0.12, skin);
            rLeg.position.y = -0.25;
            rHipJoint.add(rLeg);
            joints.rLeg = rHipJoint;

            scene.add(mannequin);
        }

        async function recordVideo() {
            if (isRecording) return;
            
            const btn = document.getElementById('recordBtn');
            const overlay = document.getElementById('recording-overlay');
            
            try {
                const stream = renderer.domElement.captureStream(60); // 60 FPS
                const mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm; codecs=vp9',
                    videoBitsPerSecond: 5000000 // 5Mbps
                });

                const chunks = [];
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `animation-${currentAnim}-${Date.now()}.webm`;
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    isRecording = false;
                    btn.disabled = false;
                    btn.innerText = "Record 5s Video (.webm)";
                    overlay.style.display = 'none';
                    showMessage("Video Downloaded!");
                };

                isRecording = true;
                btn.disabled = true;
                btn.innerText = "Recording...";
                overlay.style.display = 'flex';
                
                mediaRecorder.start();
                
                // Record for 5 seconds
                setTimeout(() => {
                    mediaRecorder.stop();
                }, 5000);

            } catch (err) {
                console.error(err);
                showMessage("Recording not supported in this browser.");
            }
        }

        function setupControls() {
            let isDragging = false;
            let prevX = 0, prevY = 0;
            
            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    mannequin.rotation.y += (e.clientX - prevX) * 0.01;
                    camera.position.y += (e.clientY - prevY) * 0.01;
                    camera.lookAt(0, 1.2, 0);
                }
                prevX = e.clientX;
                prevY = e.clientY;
            });

            document.getElementById('skinColor').addEventListener('input', (e) => {
                mannequin.traverse(c => { if(c.isMesh) c.material.color.set(e.target.value); });
            });

            document.getElementById('bodyScale').addEventListener('input', (e) => {
                mannequin.scale.setScalar(parseFloat(e.target.value));
            });

            document.getElementById('shoulderWidth').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                joints.lArm.position.x = -0.22 * val;
                joints.rArm.position.x = 0.22 * val;
                joints.torso.scale.x = val;
            });
        }

        function setAnimation(name) {
            currentAnim = name;
            showMessage(`Mode: ${name.toUpperCase()}`);
            if(name === 'reset') {
                Object.values(joints).forEach(j => j.rotation.set(0,0,0));
                mannequin.position.y = 0;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            if(currentAnim === 'idle') {
                joints.torso.rotation.x = Math.sin(t * 1.5) * 0.05;
                joints.lArm.rotation.z = -0.1 + Math.sin(t * 1.5) * 0.05;
                joints.rArm.rotation.z = 0.1 - Math.sin(t * 1.5) * 0.05;
            } else if (currentAnim === 'wave') {
                joints.rArm.rotation.z = 2.5 + Math.sin(t * 6) * 0.4;
                joints.head.rotation.z = Math.sin(t * 2) * 0.1;
            } else if (currentAnim === 'walk') {
                const speed = 6;
                joints.lLeg.rotation.x = Math.sin(t * speed) * 0.6;
                joints.rLeg.rotation.x = -Math.sin(t * speed) * 0.6;
                joints.lArm.rotation.x = -Math.sin(t * speed) * 0.5;
                joints.rArm.rotation.x = Math.sin(t * speed) * 0.5;
                mannequin.position.y = Math.abs(Math.cos(t * speed * 2)) * 0.08;
            } else {
                joints.lArm.rotation.z = -parseFloat(document.getElementById('lArmRot').value);
                joints.rArm.rotation.z = parseFloat(document.getElementById('rArmRot').value);
            }

            renderer.render(scene, camera);
        }

        function showMessage(txt) {
            const box = document.getElementById('message-box');
            box.innerText = txt;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 3000);
        }

        function takeSnapshot() {
            const dataURL = renderer.domElement.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = 'pose.png';
            link.href = dataURL;
            link.click();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
