<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Nexus Cloud • Instant Messenger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.10.2.7.min.js"></script>
  <style>
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .msg-anim { animation: slideIn 0.25s ease-out forwards; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    .glass { background: rgba(24,24,27,0.82); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans h-[100dvh] flex flex-col md:flex-row overflow-hidden antialiased">

  <!-- Toast -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 px-5 py-3 bg-indigo-600/90 text-white rounded-xl text-sm font-semibold shadow-2xl transition-all duration-300 opacity-0 pointer-events-none translate-y-[-30px] backdrop-blur-sm border border-indigo-500/30"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="w-full md:w-80 border-r border-zinc-800 flex flex-col bg-zinc-950 z-20 transition-all duration-300">
    <div class="p-6 flex flex-col h-full">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-900/40">
          <i class="ph-fill ph-chat-centered-dots text-2xl text-white"></i>
        </div>
        <h1 class="text-2xl font-black tracking-tight">Nexus Cloud</h1>
      </div>

      <!-- My Identity -->
      <div class="bg-zinc-900/60 rounded-2xl p-4 border border-zinc-800/80 mb-8">
        <div class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-3">YOU</div>
        <div class="flex items-center gap-4">
          <div id="avatar" class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg shadow-md text-white">?</div>
          <div class="min-w-0">
            <p id="userNameDisplay" class="font-bold truncate text-base">Anonymous</p>
            <p class="text-xs text-emerald-400 font-semibold flex items-center gap-1.5 mt-0.5">
              <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span> ONLINE
            </p>
          </div>
        </div>
      </div>

      <!-- Channel -->
      <div class="space-y-5 mb-8">
        <div>
          <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold block mb-2">Channel</label>
          <div class="relative">
            <i class="ph ph-hash absolute left-3.5 top-3.5 text-zinc-500"></i>
            <input id="channelInput" type="text" placeholder="channel name…" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl py-3 pl-10 pr-4 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 outline-none transition-all placeholder-zinc-600" autocomplete="off"/>
          </div>
        </div>
        <button id="joinBtn" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.98] flex items-center justify-center gap-2 shadow-lg shadow-indigo-900/25">
          <i class="ph ph-arrow-right text-lg"></i> Join / Switch
        </button>
      </div>

      <!-- Invite -->
      <button id="inviteBtn" class="w-full bg-zinc-800/80 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 font-semibold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
        <i class="ph ph-link-simple-horizontal-break"></i> Copy Invite Link
      </button>

      <div class="mt-auto pt-6 border-t border-zinc-900 text-[11px] text-zinc-600 font-medium flex justify-between items-center">
        <span>Relay • PubNub</span>
        <span id="pingDisplay">-- ms</span>
      </div>
    </div>
  </aside>

  <!-- Main Chat -->
  <main class="flex-1 flex flex-col bg-zinc-950 relative">
    <!-- Header -->
    <header class="glass border-b border-zinc-800/60 p-4 md:p-5 flex items-center justify-between sticky top-0 z-10 backdrop-blur-xl">
      <div class="flex items-center gap-3">
        <button id="mobileMenu" class="md:hidden p-2 -ml-2 text-zinc-400">
          <i class="ph ph-list text-2xl"></i>
        </button>
        <div class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center">
          <i class="ph ph-users-three text-indigo-400 text-xl"></i>
        </div>
        <div>
          <h2 id="currentChannelDisplay" class="font-bold text-lg tracking-tight">#general</h2>
          <p id="participantCount" class="text-xs text-zinc-500 font-medium">Connecting…</p>
        </div>
      </div>
    </header>

    <!-- Messages -->
    <div id="messageList" class="flex-1 overflow-y-auto p-5 md:p-8 space-y-6 pb-32 md:pb-40">
      <div class="flex flex-col items-center justify-center h-full text-center opacity-50 py-24">
        <i class="ph ph-broadcast text-7xl mb-6 text-zinc-700"></i>
        <p class="text-lg font-medium text-zinc-400">No messages yet</p>
        <p class="text-sm text-zinc-600 mt-2 max-w-xs">Share this channel name or invite link to start chatting live.</p>
      </div>
    </div>

    <!-- Input -->
    <footer class="p-4 md:p-6 bg-zinc-950/90 border-t border-zinc-900 backdrop-blur-md">
      <form id="sendForm" class="max-w-5xl mx-auto">
        <div class="flex items-end gap-3 bg-zinc-900/80 border border-zinc-800 rounded-2xl p-2.5 focus-within:border-indigo-500/70 transition-all shadow-xl">
          <button type="button" class="p-3 text-zinc-500 hover:text-zinc-200 transition-colors">
            <i class="ph ph-plus-circle text-2xl"></i>
          </button>
          <textarea id="messageInput" rows="1" placeholder="Write a message…" class="flex-1 bg-transparent border-none outline-none py-3 px-2 text-base resize-none max-h-40 placeholder-zinc-600 leading-relaxed"></textarea>
          <button type="submit" id="sendBtn" disabled class="bg-indigo-600 p-3.5 rounded-xl text-white hover:bg-indigo-500 disabled:opacity-40 disabled:hover:bg-indigo-600 transition-all active:scale-95 shadow-lg shadow-indigo-900/30">
            <i class="ph-fill ph-paper-plane-tilt text-xl"></i>
          </button>
        </div>
      </form>
    </footer>
  </main>

  <script>
    // ────────────────────────────────────────────────
    //  CONFIG – REPLACE THESE WITH YOUR OWN KEYS!
    // ────────────────────────────────────────────────
    const PUBNUB_PUBLISH_KEY  = "pub-c-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx";
    const PUBNUB_SUBSCRIBE_KEY = "sub-c-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx";

    // ────────────────────────────────────────────────
    //  IDENTITY
    // ────────────────────────────────────────────────
    const USER_ID   = 'u-' + Math.random().toString(36).slice(2,9);
    const USER_NAME = 'Guest_' + Math.random().toString(36).slice(2,6);
    const USER_COLOR = `hsl(${Math.floor(Math.random()*360)}, 78%, 62%)`;

    let currentChannel = 'general';
    let pubnub = null;
    let occupancy = 1;

    const UI = {
      toast: document.getElementById('toast'),
      channelInput: document.getElementById('channelInput'),
      joinBtn: document.getElementById('joinBtn'),
      messageList: document.getElementById('messageList'),
      messageInput: document.getElementById('messageInput'),
      sendForm: document.getElementById('sendForm'),
      sendBtn: document.getElementById('sendBtn'),
      currentChannelDisplay: document.getElementById('currentChannelDisplay'),
      participantCount: document.getElementById('participantCount'),
      userNameDisplay: document.getElementById('userNameDisplay'),
      avatar: document.getElementById('avatar'),
      inviteBtn: document.getElementById('inviteBtn'),
      pingDisplay: document.getElementById('pingDisplay')
    };

    // Identity setup
    UI.userNameDisplay.textContent = USER_NAME;
    UI.avatar.style.backgroundColor = USER_COLOR;
    UI.avatar.textContent = USER_NAME.slice(-1).toUpperCase();

    // URL-based room
    const params = new URLSearchParams(location.search);
    if (params.has('room')) {
      currentChannel = params.get('room').trim().toLowerCase();
      UI.channelInput.value = currentChannel;
    }
    UI.currentChannelDisplay.textContent = '#' + currentChannel;

    function showToast(msg, duration = 2800) {
      UI.toast.textContent = msg;
      UI.toast.classList.remove('opacity-0', 'translate-y-[-30px]');
      UI.toast.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        UI.toast.classList.add('opacity-0', 'translate-y-[-30px]');
      }, duration);
    }

    function renderMessage(msg, isLocal = false) {
      const isMe = isLocal || msg.publisher === USER_ID;
      const time = new Date(msg.message.ts || Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

      const bubble = document.createElement('div');
      bubble.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} msg-anim`;

      bubble.innerHTML = `
        <div class="flex items-center gap-2 mb-1 px-1 text-xs">
          \( {!isMe ? `<span class="font-bold" style="color: \){msg.message.color}">${msg.message.name}</span>` : ''}
          <span class="text-zinc-600">${time}</span>
        </div>
        <div class="max-w-[82%] md:max-w-[68%] px-4 py-3 rounded-2xl text-[15px] leading-relaxed shadow-sm ${
          isMe
            ? 'bg-gradient-to-br from-indigo-600 to-indigo-500 text-white rounded-tr-none'
            : 'bg-zinc-800/90 border border-zinc-700 text-zinc-100 rounded-tl-none'
        }">
          ${msg.message.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
        </div>
      `;

      if (UI.messageList.children[0]?.classList.contains('opacity-50')) {
        UI.messageList.innerHTML = '';
      }
      UI.messageList.appendChild(bubble);
      UI.messageList.scrollTop = UI.messageList.scrollHeight;
    }

    function updateParticipants(count) {
      occupancy = Math.max(1, count);
      UI.participantCount.textContent = `${occupancy} ${occupancy === 1 ? 'person' : 'people'} here`;
    }

    function switchChannel(name) {
      if (!name || name === currentChannel) return;
      const prev = currentChannel;
      currentChannel = name.toLowerCase().trim();

      UI.currentChannelDisplay.textContent = '#' + currentChannel;
      UI.messageList.innerHTML = `<div class="text-center text-zinc-600 text-sm py-12 italic">Joined #${currentChannel}</div>`;

      showToast(`Now in #${currentChannel}`);

      if (pubnub) {
        pubnub.unsubscribeAll();
        pubnub.subscribe({ channels: [currentChannel], withPresence: true });
      }

      // Reset UI occupancy until we get real number
      updateParticipants(1);
    }

    // ────────────────────────────────────────────────
    //  PUBNUB INIT
    // ────────────────────────────────────────────────
    try {
      pubnub = new PubNub({
        publishKey:   PUBNUB_PUBLISH_KEY,
        subscribeKey: PUBNUB_SUBSCRIBE_KEY,
        userId: USER_ID,
        suppressLeaveEvents: true,
        restore: true
      });

      pubnub.addListener({
        status: (s) => {
          if (s.category === 'PNConnectedCategory') {
            showToast('Connected to relay', 1800);
            UI.participantCount.classList.remove('text-amber-400');
            UI.participantCount.classList.add('text-emerald-400');
          }
          else if (s.category.includes('Error') || s.error) {
            console.error('PubNub:', s);
            showToast('Connection issue – check keys or network', 5000);
            UI.participantCount.textContent = 'Connection failed';
            UI.participantCount.classList.add('text-rose-400');
          }
        },

        message: (m) => {
          if (m.channel === currentChannel && m.publisher !== USER_ID) {
            renderMessage(m);
          }
        },

        presence: (p) => {
          if (p.channel === currentChannel) {
            pubnub.hereNow({ channels: [currentChannel] }, (status, res) => {
              if (!status.error && res) {
                updateParticipants(res.totalOccupancy);
              }
            });
          }
        }
      });

      // Join initial channel
      pubnub.subscribe({ channels: [currentChannel], withPresence: true });

      // Initial occupancy
      setTimeout(() => {
        pubnub.hereNow({ channels: [currentChannel] }, (s, r) => {
          if (!s.error && r) updateParticipants(r.totalOccupancy);
        });
      }, 1200);

    } catch (err) {
      console.error(err);
      showToast('Failed to initialize – check PubNub keys', 6000);
    }

    // ────────────────────────────────────────────────
    //  UI EVENTS
    // ────────────────────────────────────────────────
    UI.joinBtn.onclick = () => {
      const val = UI.channelInput.value.trim();
      if (val) switchChannel(val);
    };

    UI.inviteBtn.onclick = () => {
      const url = `\( {location.origin} \){location.pathname}?room=${encodeURIComponent(currentChannel)}`;
      navigator.clipboard.writeText(url).then(() => {
        showToast('Invite link copied to clipboard!');
      });
    };

    UI.messageInput.oninput = function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
      UI.sendBtn.disabled = !this.value.trim();
    };

    UI.sendForm.onsubmit = (e) => {
      e.preventDefault();
      const text = UI.messageInput.value.trim();
      if (!text || !pubnub) return;

      const payload = {
        name: USER_NAME,
        color: USER_COLOR,
        text,
        ts: Date.now()
      };

      // Optimistic UI
      renderMessage({ message: payload, publisher: USER_ID }, true);

      pubnub.publish({ channel: currentChannel, message: payload })
        .catch(err => {
          console.error('Publish failed:', err);
          showToast('Message not sent – try again', 4000);
        });

      UI.messageInput.value = '';
      UI.messageInput.style.height = 'auto';
      UI.sendBtn.disabled = true;
    };

    // Fake ping for aesthetics
    setInterval(() => {
      const rtt = 18 + Math.random() * 40 | 0;
      UI.pingDisplay.textContent = `${rtt} ms`;
    }, 4500);

  </script>
</body>
</html>
