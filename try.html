<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Native 3D Human Animator</title>
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls for camera interaction -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; color: #fff; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-panel { 
            position: absolute; top: 20px; right: 20px; z-index: 10; 
            width: 320px; max-height: calc(100vh - 40px); overflow-y: auto;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Custom Scrollbar for UI */
        #ui-panel::-webkit-scrollbar { width: 6px; }
        #ui-panel::-webkit-scrollbar-track { background: transparent; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .control-group { margin-bottom: 1.5rem; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 0.5rem; color: #cbd5e1; }
        input[type="range"] { 
            width: 100%; accent-color: #3b82f6; 
            background: rgba(255,255,255,0.1); border-radius: 8px; height: 6px; outline: none;
        }
        .btn {
            width: 100%; padding: 0.75rem; border-radius: 8px; font-weight: 600; transition: all 0.2s;
            text-align: center; cursor: pointer; border: none;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-record { background: #ef4444; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-record:hover { background: #dc2626; }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .recording-active { animation: pulse-red 2s infinite; background: transparent; border: 2px solid #ef4444; color: #ef4444; }
        .recording-dot { width: 12px; height: 12px; background: #ef4444; border-radius: 50%; }
        .recording-active .recording-dot { background: #ef4444; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel" class="p-5">
        <h2 class="text-xl font-bold mb-4 text-white border-b border-gray-700 pb-2">Animator Studio</h2>
        
        <!-- Recording Section -->
        <div class="control-group">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Video Export</h3>
            <button id="recordBtn" class="btn btn-record" onclick="toggleRecording()">
                <div class="recording-dot" id="recDot"></div>
                <span id="recordText">Start Recording</span>
            </button>
            <p class="text-xs text-gray-500 mt-2">Records infinitely until stopped. Downloads as WebM.</p>
            <a id="downloadLink" style="display: none;"></a>
        </div>

        <!-- Animation Controls -->
        <div class="control-group">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Animation State</h3>
            <div class="grid grid-cols-2 gap-2">
                <button class="btn btn-primary bg-gray-700 hover:bg-gray-600" onclick="setAnimation('idle')">Idle</button>
                <button class="btn btn-primary" onclick="setAnimation('walk')">Walk</button>
            </div>
            <div class="mt-3">
                <div class="slider-label"><span>Animation Speed</span><span id="speedVal">1.0x</span></div>
                <input type="range" id="animSpeed" min="0" max="3" step="0.1" value="1" oninput="updateSpeed(this.value)">
            </div>
        </div>

        <!-- Customization Controls -->
        <div class="control-group">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Parametric Scaling</h3>
            
            <div class="mb-3">
                <div class="slider-label"><span>Body Mass (Thickness)</span><span id="massVal">1.0</span></div>
                <input type="range" id="bodyMass" min="0.5" max="2" step="0.05" value="1" oninput="updateProportions()">
            </div>
            
            <div class="mb-3">
                <div class="slider-label"><span>Arm Length</span><span id="armVal">1.0</span></div>
                <input type="range" id="armLength" min="0.5" max="1.8" step="0.05" value="1" oninput="updateProportions()">
            </div>
            
            <div class="mb-3">
                <div class="slider-label"><span>Leg Length</span><span id="legVal">1.0</span></div>
                <input type="range" id="legLength" min="0.5" max="2" step="0.05" value="1" oninput="updateProportions()">
            </div>
        </div>

        <div class="control-group">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Materials</h3>
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-300">Skin Tone</span>
                <input type="color" id="colorSkin" value="#e0ac69" class="h-8 w-16 bg-transparent border-0 cursor-pointer" onchange="updateColors()">
            </div>
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-300">Shirt Color</span>
                <input type="color" id="colorShirt" value="#3b82f6" class="h-8 w-16 bg-transparent border-0 cursor-pointer" onchange="updateColors()">
            </div>
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-300">Pants Color</span>
                <input type="color" id="colorPants" value="#1e293b" class="h-8 w-16 bg-transparent border-0 cursor-pointer" onchange="updateColors()">
            </div>
        </div>
    </div>

    <script>
        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');
        scene.fog = new THREE.FogExp2('#1a1a2e', 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);

        // WebGL Renderer with antialiasing for high quality
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Responsive pixel ratio
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.5, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0xaaccff, 0.3);
        fillLight.position.set(-5, 3, -5);
        scene.add(fillLight);

        // Environment / Floor
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(gridHelper);

        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ color: '#111118', roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- PROCEDURAL HUMAN RIGGING ---
        // Replacing "square blocks" with rounded cylinders and spheres for anatomical fidelity
        
        const materials = {
            skin: new THREE.MeshStandardMaterial({ color: 0xe0ac69, roughness: 0.4 }),
            shirt: new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.7 }),
            pants: new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 })
        };

        const humanRig = new THREE.Group();
        scene.add(humanRig);

        // Helper function to create bones/limbs with joints
        function createLimbBlock(radiusTop, radiusBottom, length, mat, isJointTop = true) {
            const group = new THREE.Group();
            
            // The main cylinder (limb)
            const geo = new THREE.CylinderGeometry(radiusTop, radiusBottom, length, 32);
            const mesh = new THREE.Mesh(geo, mat);
            // Shift down so the group acts as the pivot at the top of the limb
            mesh.position.y = -length / 2;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            group.add(mesh);

            // Add joint sphere to smooth out bending gaps
            if (isJointTop) {
                const jointGeo = new THREE.SphereGeometry(radiusTop * 1.05, 32, 16);
                const jointMesh = new THREE.Mesh(jointGeo, mat);
                jointMesh.castShadow = true;
                group.add(jointMesh);
            }

            return { group, mesh, length };
        }

        // --- Base Proportions ---
        const baseProps = {
            headRadius: 0.22,
            torsoWidth: 0.35,
            torsoLength: 0.8,
            armRadius: 0.08,
            upperArmLen: 0.5,
            lowerArmLen: 0.45,
            legRadius: 0.11,
            upperLegLen: 0.6,
            lowerLegLen: 0.55
        };

        // References for animation
        const bones = {};

        // 1. Hips (Root)
        bones.hips = new THREE.Group();
        bones.hips.position.y = baseProps.upperLegLen + baseProps.lowerLegLen + 0.1;
        humanRig.add(bones.hips);

        // Hips Geometry (Pelvis)
        const pelvisMesh = new THREE.Mesh(new THREE.SphereGeometry(baseProps.torsoWidth * 0.9, 32, 16), materials.pants);
        pelvisMesh.scale.y = 0.6;
        pelvisMesh.castShadow = true;
        bones.hips.add(pelvisMesh);

        // 2. Torso / Spine
        bones.spine = new THREE.Group();
        const torsoInfo = createLimbBlock(baseProps.torsoWidth, baseProps.torsoWidth * 0.8, baseProps.torsoLength, materials.shirt, false);
        torsoInfo.mesh.position.y = baseProps.torsoLength / 2; // Shift up from hips
        torsoInfo.group.position.y = 0;
        bones.spine.add(torsoInfo.group);
        bones.hips.add(bones.spine);

        // 3. Neck & Head
        bones.neck = new THREE.Group();
        bones.neck.position.y = baseProps.torsoLength;
        bones.spine.add(bones.neck);

        const headMesh = new THREE.Mesh(new THREE.SphereGeometry(baseProps.headRadius, 32, 32), materials.skin);
        headMesh.position.y = baseProps.headRadius + 0.05;
        headMesh.scale.set(0.9, 1.1, 0.95); // Slightly oval head
        headMesh.castShadow = true;
        bones.neck.add(headMesh);

        // 4. Arms
        function buildArm(isLeft) {
            const sign = isLeft ? 1 : -1;
            
            // Shoulder
            const shoulder = new THREE.Group();
            shoulder.position.set(sign * (baseProps.torsoWidth + baseProps.armRadius), baseProps.torsoLength - 0.1, 0);
            bones.spine.add(shoulder);

            // Upper Arm
            const upperArm = createLimbBlock(baseProps.armRadius, baseProps.armRadius*0.9, baseProps.upperArmLen, materials.shirt);
            // Slight initial outward rotation
            upperArm.group.rotation.z = sign * 0.2; 
            shoulder.add(upperArm.group);

            // Forearm
            const forearm = createLimbBlock(baseProps.armRadius*0.85, baseProps.armRadius*0.7, baseProps.lowerArmLen, materials.skin);
            forearm.group.position.y = -baseProps.upperArmLen;
            upperArm.group.add(forearm.group);

            // Hand
            const handMesh = new THREE.Mesh(new THREE.SphereGeometry(baseProps.armRadius*0.9, 16, 16), materials.skin);
            handMesh.scale.set(1, 1.2, 0.5);
            handMesh.position.y = -baseProps.lowerArmLen - 0.05;
            forearm.group.add(handMesh);

            return { shoulder, upperArm: upperArm.group, forearm: forearm.group };
        }

        bones.leftArm = buildArm(true);
        bones.rightArm = buildArm(false);

        // 5. Legs
        function buildLeg(isLeft) {
            const sign = isLeft ? 1 : -1;

            // Hip Joint
            const hipJoint = new THREE.Group();
            hipJoint.position.set(sign * (baseProps.torsoWidth * 0.5), 0, 0);
            bones.hips.add(hipJoint);

            // Upper Leg (Thigh)
            const upperLeg = createLimbBlock(baseProps.legRadius, baseProps.legRadius*0.8, baseProps.upperLegLen, materials.pants);
            hipJoint.add(upperLeg.group);

            // Lower Leg (Calf)
            const lowerLeg = createLimbBlock(baseProps.legRadius*0.8, baseProps.legRadius*0.6, baseProps.lowerLegLen, materials.skin);
            lowerLeg.group.position.y = -baseProps.upperLegLen;
            upperLeg.group.add(lowerLeg.group);

            // Foot
            const footMesh = new THREE.Mesh(new THREE.BoxGeometry(baseProps.legRadius*1.5, 0.1, baseProps.legRadius*3), materials.pants);
            // Smooth edges on foot block
            const footGeo = new THREE.CylinderGeometry(baseProps.legRadius*1.2, baseProps.legRadius*1.2, baseProps.legRadius*3, 16);
            const foot = new THREE.Mesh(footGeo, materials.pants);
            foot.rotation.x = Math.PI / 2;
            foot.position.set(0, -baseProps.lowerLegLen, baseProps.legRadius);
            foot.castShadow = true;
            lowerLeg.group.add(foot);

            return { hipJoint, upperLeg: upperLeg.group, lowerLeg: lowerLeg.group };
        }

        bones.leftLeg = buildLeg(true);
        bones.rightLeg = buildLeg(false);


        // --- STATE & CUSTOMIZATION ---
        
        let currentState = 'walk'; // idle, walk
        let animSpeedMult = 1.0;
        let time = 0;

        function setAnimation(state) {
            currentState = state;
            // Reset rotations smoothly
            if (state === 'idle') {
                // Reset legs
                bones.leftLeg.upperLeg.rotation.set(0,0,0);
                bones.leftLeg.lowerLeg.rotation.set(0,0,0);
                bones.rightLeg.upperLeg.rotation.set(0,0,0);
                bones.rightLeg.lowerLeg.rotation.set(0,0,0);
                // Reset arms
                bones.leftArm.upperArm.rotation.set(0,0,0.2);
                bones.rightArm.upperArm.rotation.set(0,0,-0.2);
                bones.leftArm.forearm.rotation.set(0,0,0);
                bones.rightArm.forearm.rotation.set(0,0,0);
                bones.hips.position.y = baseProps.upperLegLen + baseProps.lowerLegLen + 0.1;
                bones.spine.rotation.y = 0;
            }
        }

        function updateSpeed(val) {
            animSpeedMult = parseFloat(val);
            document.getElementById('speedVal').innerText = val + 'x';
        }

        function updateColors() {
            materials.skin.color.set(document.getElementById('colorSkin').value);
            materials.shirt.color.set(document.getElementById('colorShirt').value);
            materials.pants.color.set(document.getElementById('colorPants').value);
        }

        function updateProportions() {
            const mass = parseFloat(document.getElementById('bodyMass').value);
            const armL = parseFloat(document.getElementById('armLength').value);
            const legL = parseFloat(document.getElementById('legLength').value);
            
            document.getElementById('massVal').innerText = mass.toFixed(2);
            document.getElementById('armVal').innerText = armL.toFixed(2);
            document.getElementById('legVal').innerText = legL.toFixed(2);

            // Scale thickness (mass)
            humanRig.scale.set(mass, 1, mass);

            // Scale arms
            bones.leftArm.upperArm.scale.y = armL;
            bones.leftArm.forearm.position.y = -baseProps.upperArmLen * armL;
            bones.rightArm.upperArm.scale.y = armL;
            bones.rightArm.forearm.position.y = -baseProps.upperArmLen * armL;
            // maintain forearm thickness despite scaling Y
            bones.leftArm.forearm.scale.set(1, armL, 1);
            bones.rightArm.forearm.scale.set(1, armL, 1);

            // Scale legs
            bones.leftLeg.upperLeg.scale.y = legL;
            bones.leftLeg.lowerLeg.position.y = -baseProps.upperLegLen * legL;
            bones.rightLeg.upperLeg.scale.y = legL;
            bones.rightLeg.lowerLeg.position.y = -baseProps.upperLegLen * legL;
            
            bones.leftLeg.lowerLeg.scale.set(1, legL, 1);
            bones.rightLeg.lowerLeg.scale.set(1, legL, 1);

            // Adjust hip height based on leg length
            const newLegTotal = (baseProps.upperLegLen * legL) + (baseProps.lowerLegLen * legL);
            bones.hips.position.y = newLegTotal + 0.1;
        }

        // --- PROCEDURAL LOCOMOTION (MATHEMATICS) ---
        
        const clock = new THREE.Clock();

        function animateCharacter() {
            const delta = clock.getDelta();
            time += delta * animSpeedMult;

            if (currentState === 'idle') {
                // Breathing (sine wave on chest scale and arm swing)
                const breath = Math.sin(time * 2);
                bones.spine.scale.set(1 + breath*0.02, 1 + breath*0.02, 1 + breath*0.05);
                
                // Subtle sway
                bones.hips.position.y = (baseProps.upperLegLen + baseProps.lowerLegLen + 0.1) * parseFloat(document.getElementById('legLength').value) + breath * 0.01;
                
                // Slight arm movements
                bones.leftArm.upperArm.rotation.z = 0.2 + breath * 0.02;
                bones.rightArm.upperArm.rotation.z = -0.2 - breath * 0.02;
                bones.leftArm.upperArm.rotation.x = breath * 0.05;
                bones.rightArm.upperArm.rotation.x = -breath * 0.05;
                
            } else if (currentState === 'walk') {
                // Gait Cycle Math (Forward Kinematics based on cyclical phases)
                const walkSpeed = time * 5;
                
                // Legs (180 degrees out of phase)
                const leftLegSwing = Math.sin(walkSpeed);
                const rightLegSwing = Math.sin(walkSpeed + Math.PI);

                // Upper leg rotation
                bones.leftLeg.upperLeg.rotation.x = leftLegSwing * 0.8;
                bones.rightLeg.upperLeg.rotation.x = rightLegSwing * 0.8;

                // Knee bending (must only bend backwards in humans)
                // Using max(0, -sin) to only bend during the forward swing phase
                bones.leftLeg.lowerLeg.rotation.x = Math.max(0, -Math.sin(walkSpeed - 0.5)) * 1.2;
                bones.rightLeg.lowerLeg.rotation.x = Math.max(0, -Math.sin(walkSpeed + Math.PI - 0.5)) * 1.2;

                // Arms (Opposite to legs)
                bones.leftArm.upperArm.rotation.x = -leftLegSwing * 0.6;
                bones.rightArm.upperArm.rotation.x = -rightLegSwing * 0.6;

                // Elbows bend slightly more on forward swing
                bones.leftArm.forearm.rotation.x = Math.max(0, -leftLegSwing) * 0.5 + 0.2;
                bones.rightArm.forearm.rotation.x = Math.max(0, -rightLegSwing) * 0.5 + 0.2;

                // Torso rotation (counter-balancing arms/legs)
                bones.spine.rotation.y = leftLegSwing * 0.1;
                bones.hips.rotation.y = -leftLegSwing * 0.1;

                // Center of mass bobbing (sine wave twice as fast)
                const legL = parseFloat(document.getElementById('legLength').value);
                const baseH = (baseProps.upperLegLen * legL) + (baseProps.lowerLegLen * legL) + 0.1;
                bones.hips.position.y = baseH + Math.abs(Math.cos(walkSpeed)) * 0.1;
                
                // Keep scale normal (cancel out idle breath)
                bones.spine.scale.set(1,1,1);
            }
        }

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            animateCharacter();
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


        // --- VIDEO EXPORT SYSTEM (MediaRecorder API) ---
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            const text = document.getElementById('recordText');
            
            if (!isRecording) {
                // START RECORDING
                try {
                    // Capture canvas stream at 60fps
                    const stream = renderer.domElement.captureStream(60);
                    
                    // Prefer standard WebM, fallback to whatever browser supports
                    const options = { mimeType: 'video/webm; codecs=vp9' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options.mimeType = 'video/webm';
                    }

                    mediaRecorder = new MediaRecorder(stream, options);
                    recordedChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = exportVideo;

                    mediaRecorder.start(100); // Collect data every 100ms
                    isRecording = true;
                    
                    // Update UI
                    btn.classList.add('recording-active');
                    btn.classList.remove('btn-record');
                    text.innerText = "Stop Recording";

                } catch (e) {
                    alert("Recording not supported in this browser. Try Chrome or Firefox.");
                    console.error(e);
                }
            } else {
                // STOP RECORDING
                mediaRecorder.stop();
                isRecording = false;
                
                // Update UI
                btn.classList.remove('recording-active');
                btn.classList.add('btn-record');
                text.innerText = "Start Recording";
            }
        }

        function exportVideo() {
            // Combine chunks into a single Blob
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            
            // Trigger download automatically
            const a = document.getElementById('downloadLink');
            a.style.display = 'none';
            a.href = url;
            a.download = `animation_${Date.now()}.webm`;
            a.click();
            
            // Cleanup
            setTimeout(() => {
                URL.revokeObjectURL(url);
            }, 1000);
        }

        // Start everything
        updateProportions(); // Initial layout calc
        animate();

    </script>
</body>
</html>
