<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cubbis Jump 3D</title>

<!-- Legacy/Root Fallback -->
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

<!-- Modern PNGs -->
<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/images/favicon-48x48.png">

<!-- iOS/Safari -->
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">

<!-- PWA & Android -->
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#060807">

    <style>
        :root {
            --primary: #0ff;
            --secondary: #f0f;
            --danger: #f00;
            --bg: #050510;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevent scroll on touch devices */
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary);
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none !important;
        }

        h1 {
            color: #fff;
            font-size: 4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px var(--secondary), 0 0 40px var(--secondary);
            text-align: center;
        }

        p.subtitle {
            color: #aaa;
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-align: center;
            max-width: 80%;
        }

        button {
            background: transparent;
            color: #fff;
            border: 2px solid var(--primary);
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3) inset, 0 0 20px rgba(0, 255, 255, 0.5);
            transition: all 0.2s;
            pointer-events: auto;
        }

        button:hover, button:active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 25px var(--primary) inset, 0 0 40px var(--primary);
            transform: scale(1.05);
        }

        .final-score {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary);
        }

        /* Mobile touch zones hints */
        .touch-zones {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0.5;
            color: white;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hud { font-size: 1.2rem; padding: 15px; }
        }
    </style>
    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div class="hud" id="hud">
            <div>SCORE: <span id="score-display">0</span></div>
            <div>MULTIPLIER: x<span id="multiplier-display">1</span></div>
        </div>
        
        <!-- Touch control hints for mobile -->
        <div class="touch-zones hidden" id="touch-hints">
            <span>&larr; Swipe Left</span>
            <span>Swipe Up to Jump</span>
            <span>Swipe Right &rarr;</span>
        </div>

        <div class="screen" id="start-screen">
            <h1>Cubbis Jump 3D</h1>
            <p class="subtitle">Desktop: Arrow Keys / A D to move, Space to Jump.<br>Mobile: Swipe Left/Right to move, Swipe Up to Jump.</p>
            <button id="start-btn">Initialize</button>
        </div>

        <div class="screen hidden" id="game-over-screen">
            <h1>Mission Failed</h1>
            <div class="final-score">Final Score: <span id="final-score-display">0</span></div>
            <button id="restart-btn">Restart</button>
        </div>
    </div>

    <script>
        // Game Constants & Variables
        const GAME_SPEED_INIT = 0.6;
        const GAME_SPEED_MAX = 2.0;
        const LANE_WIDTH = 4;
        const OBSTACLE_SPAWN_Z = -100;
        const PLAYER_Z = 10;
        
        let scene, camera, renderer;
        let player, floorGrid;
        let obstacles = [];
        let collectibles = [];
        let particles = [];
        
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let speedMultiplier = 1;
        let gameSpeed = GAME_SPEED_INIT;
        let distanceTraveled = 0;
        
        // Player state
        let currentLane = 0; // -1 (left), 0 (center), 1 (right)
        let playerVelocityY = 0;
        let isJumping = false;
        const gravity = -0.015;
        const jumpStrength = 0.4;
        
        // Colors & Materials
        const colorPrimary = 0x00ffff;
        const colorSecondary = 0xff00ff;
        const colorDanger = 0xff0033;
        const colorGold = 0xffd700;
        const colorBg = 0x050510;

        // UI Elements
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const hud = document.getElementById('hud');
        const touchHints = document.getElementById('touch-hints');
        const scoreDisplay = document.getElementById('score-display');
        const multiplierDisplay = document.getElementById('multiplier-display');
        const finalScoreDisplay = document.getElementById('final-score-display');
        
        // Touch handling
        let touchStartX = 0;
        let touchStartY = 0;

        window.onload = function() {
            init3D();
            setupEventListeners();
            animate();
        };

        function init3D() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(colorBg);
            scene.fog = new THREE.FogExp2(colorBg, 0.015);

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 5, 18);
            camera.lookAt(0, 0, -20);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // 4. Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(-10, 20, 20);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -50;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            const pointLight = new THREE.PointLight(colorPrimary, 1, 50);
            pointLight.position.set(0, 2, PLAYER_Z);
            scene.add(pointLight);

            // 5. Build Environment
            buildEnvironment();

            // 6. Build Player
            buildPlayer();

            // Handle resize
            window.addEventListener('resize', onWindowResize, false);
        }

        function buildEnvironment() {
            // Infinite Floor Illusion (Grid)
            const gridHelper = new THREE.GridHelper(200, 100, colorSecondary, 0x222244);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper);
            floorGrid = gridHelper;

            // Side walls (Neon strips)
            const wallGeo = new THREE.BoxGeometry(0.5, 1, 200);
            const wallMat = new THREE.MeshStandardMaterial({ 
                color: colorSecondary, 
                emissive: colorSecondary, 
                emissiveIntensity: 0.5 
            });
            
            const leftWall = new THREE.Mesh(wallGeo, wallMat);
            leftWall.position.set(-LANE_WIDTH * 1.5 - 1, 0, -50);
            scene.add(leftWall);

            const rightWall = new THREE.Mesh(wallGeo, wallMat);
            rightWall.position.set(LANE_WIDTH * 1.5 + 1, 0, -50);
            scene.add(rightWall);
        }

        function buildPlayer() {
            const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const material = new THREE.MeshStandardMaterial({ 
                color: colorPrimary,
                emissive: colorPrimary,
                emissiveIntensity: 0.4,
                roughness: 0.2,
                metalness: 0.8
            });
            player = new THREE.Mesh(geometry, material);
            player.position.set(0, 0.25, PLAYER_Z);
            player.castShadow = true;
            player.receiveShadow = true;
            
            // Add an inner core
            const coreGeo = new THREE.BoxGeometry(1, 1, 1);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const core = new THREE.Mesh(coreGeo, coreMat);
            player.add(core);

            scene.add(player);
        }

        function setupEventListeners() {
            // UI Buttons
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', startGame);

            // Keyboard Controls
            document.addEventListener('keydown', (e) => {
                if (gameState !== 'playing') return;
                
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    movePlayer(-1);
                } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    movePlayer(1);
                } else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.code === 'Space') {
                    jumpPlayer();
                }
            });

            // Touch Controls
            document.addEventListener('touchstart', (e) => {
                if (gameState !== 'playing') return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, {passive: false});

            document.addEventListener('touchend', (e) => {
                if (gameState !== 'playing') return;
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;

                // Check for swipe up (jump)
                if (Math.abs(diffY) > 50 && diffY < -50 && Math.abs(diffY) > Math.abs(diffX)) {
                    jumpPlayer();
                } 
                // Check for tap / swipe left/right
                else {
                    const screenWidth = window.innerWidth;
                    if (touchEndX < screenWidth / 2) {
                        movePlayer(-1);
                    } else {
                        movePlayer(1);
                    }
                }
            }, {passive: false});
        }

        function movePlayer(direction) {
            // direction: -1 (left), 1 (right)
            currentLane += direction;
            // Clamp lane between -1 and 1
            if (currentLane < -1) currentLane = -1;
            if (currentLane > 1) currentLane = 1;
        }

        function jumpPlayer() {
            if (!isJumping) {
                isJumping = true;
                playerVelocityY = jumpStrength;
            }
        }

        function startGame() {
            // Reset state
            score = 0;
            speedMultiplier = 1;
            gameSpeed = GAME_SPEED_INIT;
            distanceTraveled = 0;
            currentLane = 0;
            player.position.set(0, 0.25, PLAYER_Z);
            player.rotation.set(0,0,0);
            player.visible = true;
            isJumping = false;
            playerVelocityY = 0;

            // Clear old objects
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            collectibles.forEach(col => scene.remove(col));
            collectibles = [];
            particles.forEach(p => scene.remove(p));
            particles = [];

            // UI
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.style.opacity = '1';
            updateHUD();
            
            // Show touch hints briefly on mobile
            if(window.innerWidth <= 768) {
                touchHints.classList.remove('hidden');
                setTimeout(() => touchHints.classList.add('hidden'), 3000);
            }

            gameState = 'playing';
        }

        function gameOver() {
            gameState = 'gameover';
            hud.style.opacity = '0';
            finalScoreDisplay.innerText = Math.floor(score);
            setTimeout(() => {
                gameOverScreen.classList.remove('hidden');
            }, 1000);

            createExplosion(player.position);
            player.visible = false;
            
            // Camera shake
            let shakeInterval = setInterval(() => {
                camera.position.x = (Math.random() - 0.5) * 1;
                camera.position.y = 5 + (Math.random() - 0.5) * 1;
            }, 50);
            
            setTimeout(() => {
                clearInterval(shakeInterval);
                camera.position.set(0, 5, 18);
            }, 500);
        }

        // --- Spawning Logic ---
        function spawnObstacle() {
            // Random lane: -1, 0, or 1
            const lane = Math.floor(Math.random() * 3) - 1;
            const isTall = Math.random() > 0.7; // 30% chance for tall obstacle requiring dodge
            
            const height = isTall ? 4 : 1.5;
            const geometry = new THREE.BoxGeometry(2, height, 2);
            const material = new THREE.MeshStandardMaterial({ 
                color: colorDanger,
                roughness: 0.4,
                metalness: 0.2,
                emissive: 0x550000
            });
            
            const obstacle = new THREE.Mesh(geometry, material);
            obstacle.position.set(lane * LANE_WIDTH, height/2 - 0.5, OBSTACLE_SPAWN_Z);
            obstacle.castShadow = true;
            obstacle.receiveShadow = true;
            
            // Bounding box for collision
            obstacle.userData = { 
                box: new THREE.Box3(),
                passed: false
            };
            
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function spawnCollectible() {
            const lane = Math.floor(Math.random() * 3) - 1;
            // Sometimes spawn high up so player has to jump
            const isHigh = Math.random() > 0.6;
            const yPos = isHigh ? 3 : 0.5;

            const geometry = new THREE.OctahedronGeometry(0.8);
            const material = new THREE.MeshStandardMaterial({
                color: colorGold,
                emissive: colorGold,
                emissiveIntensity: 0.8,
                wireframe: true
            });

            const coin = new THREE.Mesh(geometry, material);
            coin.position.set(lane * LANE_WIDTH, yPos, OBSTACLE_SPAWN_Z - 20); // Spawn slightly behind obstacles
            
            coin.userData = { box: new THREE.Box3() };
            
            // Add light to coin
            const coinLight = new THREE.PointLight(colorGold, 0.5, 5);
            coin.add(coinLight);

            scene.add(coin);
            collectibles.push(coin);
        }

        function createExplosion(position) {
            const particleCount = 30;
            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const material = new THREE.MeshBasicMaterial({ color: colorPrimary });

            for (let i = 0; i < particleCount; i++) {
                const particle = new THREE.Mesh(geometry, material);
                particle.position.copy(position);
                
                // Random velocity
                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 1.5,
                    (Math.random() - 0.5) * 1.5 + 0.5,
                    (Math.random() - 0.5) * 1.5
                );
                
                scene.add(particle);
                particles.push(particle);
            }
        }

        // --- Game Loop Update ---
        function update() {
            if (gameState !== 'playing') {
                updateParticles();
                return;
            }

            // 1. Move Environment (Illusion of speed)
            floorGrid.position.z += gameSpeed;
            if (floorGrid.position.z > 10) {
                floorGrid.position.z = 0; // Reset grid to loop
            }

            // 2. Update Player Logic
            // Smooth lane changing (Lerp)
            const targetX = currentLane * LANE_WIDTH;
            player.position.x += (targetX - player.position.x) * 0.15;
            
            // Player Roll Animation
            player.rotation.z -= (player.position.x - targetX) * 0.05;
            player.rotation.x -= gameSpeed * 0.1; // Roll forward
            
            // Jumping Logic
            if (isJumping) {
                player.position.y += playerVelocityY;
                playerVelocityY += gravity; // Apply gravity
                
                // Land
                if (player.position.y <= 0.25) {
                    player.position.y = 0.25;
                    isJumping = false;
                    playerVelocityY = 0;
                }
            }

            // Player Bounding Box
            const playerBox = new THREE.Box3().setFromObject(player);
            // Shrink hit box slightly for fairer gameplay
            playerBox.expandByScalar(-0.3);

            // 3. Spawning System
            distanceTraveled += gameSpeed;
            if (Math.random() < 0.03 * speedMultiplier) {
                spawnObstacle();
            }
            if (Math.random() < 0.015) {
                spawnCollectible();
            }

            // 4. Update Obstacles & Collision
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += gameSpeed;
                
                // Update Bounding Box
                obs.userData.box.setFromObject(obs);

                // Check Collision
                if (playerBox.intersectsBox(obs.userData.box)) {
                    gameOver();
                    return; // Stop updating
                }

                // Pass obstacle (Score)
                if (!obs.userData.passed && obs.position.z > PLAYER_Z) {
                    obs.userData.passed = true;
                    score += 10 * speedMultiplier;
                    updateHUD();
                }

                // Remove when out of bounds
                if (obs.position.z > 30) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }

            // 5. Update Collectibles & Collision
            for (let i = collectibles.length - 1; i >= 0; i--) {
                let col = collectibles[i];
                col.position.z += gameSpeed;
                col.rotation.y += 0.05;
                col.rotation.x += 0.05;
                
                col.userData.box.setFromObject(col);

                // Collect
                if (playerBox.intersectsBox(col.userData.box)) {
                    score += 50 * speedMultiplier;
                    updateHUD();
                    scene.remove(col);
                    collectibles.splice(i, 1);
                    continue;
                }

                // Remove out of bounds
                if (col.position.z > 30) {
                    scene.remove(col);
                    collectibles.splice(i, 1);
                }
            }

            // 6. Increase Difficulty
            if (distanceTraveled > 500) {
                distanceTraveled = 0;
                if (gameSpeed < GAME_SPEED_MAX) {
                    gameSpeed += 0.05;
                    speedMultiplier = (gameSpeed / GAME_SPEED_INIT).toFixed(1);
                    updateHUD();
                }
            }
            
            // Add passive score based on survival
            score += 0.1 * speedMultiplier;
            if(Math.floor(score) % 10 === 0) updateHUD();

            updateParticles();
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.position.add(p.userData.velocity);
                p.rotation.x += 0.1;
                p.rotation.y += 0.1;
                p.scale.multiplyScalar(0.95); // shrink

                if (p.scale.x < 0.01) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }
        }

        function updateHUD() {
            scoreDisplay.innerText = Math.floor(score);
            multiplierDisplay.innerText = speedMultiplier;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Main Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
