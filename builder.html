<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Visual Studio</title>
    
    <!-- Tailwind CSS for styling the editor interface -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (loaded directly in browser) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (compiles JSX into browser-readable JS on the fly) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        /* Prevent canvas interactions from triggering default browser behaviors */
        img { user-drag: none; -webkit-user-drag: none; user-select: none; }
        /* Add user-select none to prevent text selection on canvas */
        .canvas-container * { user-select: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON SYSTEM (Added more icons for new elements) ---
        const Icon = ({ name, size = 18, className = '' }) => {
            const props = { width: size, height: size, className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" };
            switch(name) {
                case 'Plus': return <svg {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
                case 'Layers': return <svg {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></svg>;
                case 'Monitor': return <svg {...props}><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>;
                case 'Tablet': return <svg {...props}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>;
                case 'Smartphone': return <svg {...props}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>;
                case 'Code': return <svg {...props}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
                case 'Settings2': return <svg {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
                case 'Trash2': return <svg {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
                case 'ChevronDown': return <svg {...props}><polyline points="6 9 12 15 18 9"/></svg>;
                case 'ChevronRight': return <svg {...props}><polyline points="9 18 15 12 9 6"/></svg>;
                case 'Square': return <svg {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>;
                case 'BoxSelect': return <svg {...props}><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>;
                case 'Layout': return <svg {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>;
                case 'Type': return <svg {...props}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>;
                case 'AlignLeft': return <svg {...props}><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>;
                case 'MousePointer2': return <svg {...props}><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>;
                case 'ImageIcon': return <svg {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
                case 'Link': return <svg {...props}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>; // Added for link
                case 'List': return <svg {...props}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>; // Added for lists
                case 'Form': return <svg {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M7 7h10"/><path d="M7 12h10"/><path d="M7 17h10"/></svg>; // Added for forms
                case 'Undo': return <svg {...props}><path d="M3 12v.3A3.5 3.5 0 0 0 6.5 16h9.5a3.5 3.5 0 0 0 3.5-3.5V12"/><path d="M3 9l4-4 4 4"/></svg>; // Added for undo
                case 'Redo': return <svg {...props}><path d="M21 12v.3a3.5 3.5 0 0 1-3.5 3.5H8a3.5 3.5 0 0 1-3.5-3.5V12"/><path d="M21 9l-4-4-4 4"/></svg>; // Added for redo
                case 'ArrowUp': return <svg {...props}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>; // For move up
                case 'ArrowDown': return <svg {...props}><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>; // For move down
                default: return <svg {...props}></svg>;
            }
        };

        // --- INITIAL STATE (Updated defaultTree with attrs, more realistic structure) ---
        const generateId = () => 'el_' + Math.random().toString(36).substr(2, 9);

        const defaultTree = {
            id: 'root',
            tag: 'div',
            name: 'Body',
            content: '',
            styles: { minHeight: '100vh', backgroundColor: '#ffffff', fontFamily: 'sans-serif', margin: '0' },
            attrs: {}, // New: for attributes like src, href
            children: [
                {
                    id: generateId(),
                    tag: 'section',
                    name: 'Hero Section',
                    content: '',
                    styles: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 20px', backgroundColor: '#f8fafc', borderBottom: '1px solid #e2e8f0', minHeight: '60vh' },
                    attrs: {},
                    children: [
                        {
                            id: generateId(),
                            tag: 'span',
                            name: 'Badge',
                            content: 'NEW FEATURE',
                            styles: { backgroundColor: '#dbeafe', color: '#1d4ed8', padding: '4px 12px', borderRadius: '9999px', fontSize: '12px', fontWeight: 'bold', marginBottom: '24px', letterSpacing: '1px' },
                            attrs: {},
                            children: [] // Even for leaves, use [] for consistency; check length for content edit
                        },
                        {
                            id: generateId(),
                            tag: 'h1',
                            name: 'Heading',
                            content: 'Build the web, visually.',
                            styles: { fontSize: '48px', fontWeight: '800', color: '#0f172a', marginBottom: '16px', textAlign: 'center', lineHeight: '1.2', maxWidth: '800px' },
                            attrs: {},
                            children: []
                        },
                        {
                            id: generateId(),
                            tag: 'p',
                            name: 'Subtitle',
                            content: 'A professional-grade visual editor that outputs clean, production-ready HTML and CSS. Built entirely in a single file.',
                            styles: { fontSize: '18px', color: '#64748b', marginBottom: '40px', textAlign: 'center', maxWidth: '600px', lineHeight: '1.6' },
                            attrs: {},
                            children: []
                        },
                        {
                            id: generateId(),
                            tag: 'div',
                            name: 'Button Group',
                            content: '',
                            styles: { display: 'flex', gap: '16px' },
                            attrs: {},
                            children: [
                                {
                                    id: generateId(),
                                    tag: 'button',
                                    name: 'Primary Button',
                                    content: 'Start Building',
                                    styles: { backgroundColor: '#3b82f6', color: '#ffffff', padding: '12px 24px', borderRadius: '8px', border: 'none', fontSize: '16px', fontWeight: '600', cursor: 'pointer' },
                                    attrs: {},
                                    children: []
                                },
                                {
                                    id: generateId(),
                                    tag: 'button',
                                    name: 'Secondary Button',
                                    content: 'View Source',
                                    styles: { backgroundColor: '#ffffff', color: '#0f172a', padding: '12px 24px', borderRadius: '8px', border: '1px solid #cbd5e1', fontSize: '16px', fontWeight: '600', cursor: 'pointer' },
                                    attrs: {},
                                    children: []
                                }
                            ]
                        }
                    ]
                }
            ]
        };

        // --- MAIN APPLICATION COMPONENT ---
        function App() {
            const [tree, setTree] = useState(defaultTree);
            const [history, setHistory] = useState([defaultTree]); // New: for undo/redo
            const [historyIndex, setHistoryIndex] = useState(0);
            const [selectedId, setSelectedId] = useState('root');
            const [hoveredId, setHoveredId] = useState(null);
            const [viewMode, setViewMode] = useState('desktop'); 
            const [activeTab, setActiveTab] = useState('add'); 
            const [elementSearch, setElementSearch] = useState(''); // New: search in add tab

            // --- HELPER: Update Tree with History ---
            const updateTree = (updater) => {
                setTree(prev => {
                    const newTree = typeof updater === 'function' ? updater(prev) : updater;
                    const newHistory = history.slice(0, historyIndex + 1).concat([JSON.parse(JSON.stringify(newTree))]); // Deep copy
                    setHistory(newHistory);
                    setHistoryIndex(newHistory.length - 1);
                    return newTree;
                });
            };

            // --- Undo/Redo ---
            const handleUndo = () => {
                if (historyIndex > 0) {
                    setTree(history[historyIndex - 1]);
                    setHistoryIndex(historyIndex - 1);
                }
            };

            const handleRedo = () => {
                if (historyIndex < history.length - 1) {
                    setTree(history[historyIndex + 1]);
                    setHistoryIndex(historyIndex + 1);
                }
            };

            // --- HELPER: Find Node ---
            const findNode = (nodes, id) => {
                if (nodes.id === id) return nodes;
                if (nodes.children) {
                    for (let child of nodes.children) {
                        const found = findNode(child, id);
                        if (found) return found;
                    }
                }
                return null;
            };

            // --- HELPER: Find Parent ---
            const findParent = (nodes, id, parent = null) => {
                if (nodes.id === id) return parent;
                if (nodes.children) {
                    for (let child of nodes.children) {
                        const found = findParent(child, id, nodes);
                        if (found) return found;
                    }
                }
                return null;
            };

            const selectedNode = findNode(tree, selectedId) || tree;

            // --- HELPER: Update Node ---
            const updateNode = (node, id, updates) => {
                if (node.id === id) {
                    return { ...node, ...updates };
                }
                if (node.children) {
                    return { ...node, children: node.children.map(child => updateNode(child, id, updates)) };
                }
                return node;
            };

            const handleUpdateStyle = (key, value) => {
                // Sanitize value (e.g., add 'px' if numeric and not %/rem)
                let sanitized = value;
                if (/^\d+$/.test(value) && !['opacity', 'lineHeight'].includes(key)) sanitized += 'px';
                updateTree(prev => updateNode(prev, selectedId, {
                    styles: { ...findNode(prev, selectedId).styles, [key]: sanitized }
                }));
            };

            const handleUpdateContent = (value) => {
                updateTree(prev => updateNode(prev, selectedId, { content: value }));
            };

            const handleUpdateName = (value) => {
                updateTree(prev => updateNode(prev, selectedId, { name: value }));
            };

            const handleUpdateAttr = (key, value) => {
                updateTree(prev => updateNode(prev, selectedId, {
                    attrs: { ...findNode(prev, selectedId).attrs, [key]: value }
                }));
            };

            // --- HELPER: Add Node (Fixed: add to parent if selected is leaf) ---
            const handleAddElement = (type) => {
                const newNode = {
                    id: generateId(),
                    tag: type.tag,
                    name: type.name,
                    content: type.content || '',
                    styles: { ...type.defaultStyles },
                    attrs: { ...type.defaultAttrs },
                    children: type.canHaveChildren ? [] : []
                };

                updateTree(prev => {
                    let targetId = selectedId;
                    const selected = findNode(prev, selectedId);
                    if (!selected.children || selected.children.length === 0) {
                        const parent = findParent(prev, selectedId);
                        if (parent) targetId = parent.id; // Fix: add to parent if leaf
                    }
                    const insertInto = (node) => {
                        if (node.id === targetId) {
                            return { ...node, children: [...node.children, newNode] };
                        }
                        if (node.children) {
                            return { ...node, children: node.children.map(insertInto) };
                        }
                        return node;
                    };
                    return insertInto(prev);
                });
                
                setSelectedId(newNode.id);
            };

            // --- HELPER: Delete Node ---
            const handleDelete = () => {
                if (selectedId === 'root') return;
                updateTree(prev => {
                    const removeNode = (node) => {
                        if (!node.children) return node;
                        return {
                            ...node,
                            children: node.children.filter(c => c.id !== selectedId).map(removeNode)
                        };
                    };
                    return removeNode(prev);
                });
                setSelectedId('root');
            };

            // --- HELPER: Move Node Up/Down ---
            const handleMove = (direction) => {
                if (selectedId === 'root') return;
                const parent = findParent(tree, selectedId);
                if (!parent) return;
                const index = parent.children.findIndex(c => c.id === selectedId);
                if ((direction === 'up' && index <= 0) || (direction === 'down' && index >= parent.children.length - 1)) return;
                const newChildren = [...parent.children];
                const swapIndex = direction === 'up' ? index - 1 : index + 1;
                [newChildren[index], newChildren[swapIndex]] = [newChildren[swapIndex], newChildren[index]];
                updateTree(prev => updateNode(prev, parent.id, { children: newChildren }));
            };

            // --- COMPILER: React Tree to HTML/CSS (Improved: attrs, combined CSS, basic media, no specials) ---
            const generateExportCode = () => {
                let cssLines = [];
                let classMap = {}; // To combine shared styles (basic dedupe)

                const compileNodeHTML = (node) => {
                    const className = `el-${node.id}`;
                    let styleRules = [];
                    for (const [key, value] of Object.entries(node.styles)) {
                        if (value) {
                            const cssKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();
                            styleRules.push(`${cssKey}: ${value};`);
                        }
                    }
                    if (styleRules.length > 0) {
                        const ruleStr = styleRules.join(' ');
                        if (!classMap[ruleStr]) classMap[ruleStr] = [];
                        classMap[ruleStr].push(className);
                    }

                    const isSelfClosing = ['img', 'input', 'br', 'hr', 'textarea'].includes(node.tag);
                    let html = `<\( {node.tag} class=" \){className}"`;
                    
                    for (const [attrKey, attrValue] of Object.entries(node.attrs || {})) {
                        html += ` \( {attrKey}=" \){attrValue}"`;
                    }

                    if (isSelfClosing) {
                        html += ' />';
                        return html;
                    } else {
                        html += '>';
                        if (node.content) html += node.content;
                        if (node.children) {
                            html += '\n' + node.children.map(c => compileNodeHTML(c)).join('\n') + '\n';
                        }
                        html += `</${node.tag}>`;
                    }
                    return html;
                };

                const bodyHtml = compileNodeHTML(tree);

                // Combine CSS for dedupe
                for (const [ruleStr, classes] of Object.entries(classMap)) {
                    cssLines.push(`.${classes.join(', .')} { ${ruleStr} }`);
                }

                return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exported Site</title>
    <style>
        /* Base Reset */
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        
        /* Generated Styles */
${cssLines.map(l => `        ${l}`).join('\n')}

        /* Basic Responsive Stub (expand with media queries per viewMode) */
        @media (max-width: 768px) {
            /* Example: stack flex on mobile */
            .el-root { flex-direction: column; }
        }
    </style>
</head>
<body>
${bodyHtml}
</body>
</html>`;
            };

            const handleDownload = () => {
                const code = generateExportCode();
                const blob = new Blob([code], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'my-website.html';
                a.click();
                URL.revokeObjectURL(url);
            };

            // --- UI COMPONENTS (Expanded library with more elements) ---
            const ElementsLibrary = [
                { name: 'Section', tag: 'section', icon: 'Square', canHaveChildren: true, defaultStyles: { padding: '40px 20px', backgroundColor: '#ffffff', minHeight: '50px' }, defaultAttrs: {} },
                { name: 'Div Block', tag: 'div', icon: 'BoxSelect', canHaveChildren: true, defaultStyles: { padding: '20px', minHeight: '50px' }, defaultAttrs: {} },
                { name: 'Grid Row', tag: 'div', icon: 'Layout', canHaveChildren: true, defaultStyles: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '20px', width: '100%' }, defaultAttrs: {} },
                { name: 'Heading 1', tag: 'h1', icon: 'Type', content: 'Heading', canHaveChildren: false, defaultStyles: { fontSize: '32px', fontWeight: 'bold', margin: '0 0 16px 0', color: '#111827' }, defaultAttrs: {} },
                { name: 'Paragraph', tag: 'p', icon: 'AlignLeft', content: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit.', canHaveChildren: false, defaultStyles: { fontSize: '16px', color: '#4b5563', margin: '0 0 16px 0', lineHeight: '1.5' }, defaultAttrs: {} },
                { name: 'Button', tag: 'button', icon: 'MousePointer2', content: 'Click Me', canHaveChildren: false, defaultStyles: { padding: '10px 20px', backgroundColor: '#3b82f6', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', display: 'inline-block' }, defaultAttrs: {} },
                { name: 'Image', tag: 'img', icon: 'ImageIcon', canHaveChildren: false, defaultStyles: { maxWidth: '100%', height: 'auto', display: 'block' }, defaultAttrs: { src: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop', alt: 'Image' } },
                // New Elements
                { name: 'Link', tag: 'a', icon: 'Link', content: 'Click Here', canHaveChildren: false, defaultStyles: { color: '#3b82f6', textDecoration: 'underline' }, defaultAttrs: { href: '#' } },
                { name: 'Unordered List', tag: 'ul', icon: 'List', canHaveChildren: true, defaultStyles: { listStyleType: 'disc', paddingLeft: '20px' }, defaultAttrs: {} },
                { name: 'List Item', tag: 'li', icon: 'List', content: 'List Item', canHaveChildren: false, defaultStyles: { marginBottom: '8px' }, defaultAttrs: {} },
                { name: 'Form', tag: 'form', icon: 'Form', canHaveChildren: true, defaultStyles: { display: 'flex', flexDirection: 'column', gap: '16px' }, defaultAttrs: { action: '', method: 'post' } },
                { name: 'Input', tag: 'input', icon: 'Form', canHaveChildren: false, defaultStyles: { padding: '8px', border: '1px solid #ccc', borderRadius: '4px' }, defaultAttrs: { type: 'text', placeholder: 'Enter text' } },
                { name: 'Textarea', tag: 'textarea', icon: 'Form', content: 'Enter message', canHaveChildren: false, defaultStyles: { padding: '8px', border: '1px solid #ccc', borderRadius: '4px', minHeight: '100px' }, defaultAttrs: { placeholder: 'Enter message' } },
            ];

            // Filter library by search
            const filteredElements = ElementsLibrary.filter(el => el.name.toLowerCase().includes(elementSearch.toLowerCase()));

            const CanvasNode = ({ node }) => {
                const isSelected = selectedId === node.id;
                const isHovered = hoveredId === node.id;
                const Tag = node.tag;

                const handleClick = (e) => {
                    e.stopPropagation();
                    setSelectedId(node.id);
                };

                const handleMouseOver = (e) => {
                    e.stopPropagation();
                    setHoveredId(node.id);
                };

                const handleMouseOut = (e) => {
                    e.stopPropagation();
                    setHoveredId(null);
                };

                let nodeStyle = { ...node.styles };
                
                if (isSelected) {
                    nodeStyle.outline = '2px solid #3b82f6';
                    nodeStyle.outlineOffset = '-2px';
                } else if (isHovered && node.id !== 'root') {
                    nodeStyle.outline = '1px dashed #93c5fd';
                    nodeStyle.outlineOffset = '-1px';
                }

                if (node.children.length === 0 && node.tag !== 'img' && node.tag !== 'input' && node.tag !== 'textarea') {
                    nodeStyle.minHeight = nodeStyle.minHeight || '40px';
                    if(!nodeStyle.backgroundColor && !nodeStyle.backgroundImage && node.id !== 'root') {
                        nodeStyle.backgroundColor = 'rgba(243, 244, 246, 0.5)';
                    }
                }

                return (
                    <Tag style={nodeStyle} {...node.attrs} onClick={handleClick} onMouseOver={handleMouseOver} onMouseOut={handleMouseOut}>
                        {node.content}
                        {node.children.map(child => <CanvasNode key={child.id} node={child} />)}
                    </Tag>
                );
            };

            const LayerItem = ({ node, level = 0 }) => {
                const isSelected = selectedId === node.id;
                const [isOpen, setIsOpen] = useState(true);
                const hasChildren = node.children.length > 0;

                // Stub for drag in layers (expand with onDragStart, onDragOver, onDrop for full reordering)
                // e.g., onDragStart={(e) => e.dataTransfer.setData('text/plain', node.id)}

                return (
                    <div className="w-full">
                        <div 
                            className={`flex items-center py-1.5 px-2 text-xs cursor-pointer select-none transition-colors
                                ${isSelected ? 'bg-blue-500 text-white' : 'text-gray-300 hover:bg-gray-800'}`}
                            style={{ paddingLeft: `${(level * 12) + 8}px` }}
                            onClick={() => setSelectedId(node.id)}
                            draggable // Stub: enable drag for future reordering
                        >
                            <div className="w-4 h-4 mr-1 flex items-center justify-center" onClick={(e) => { e.stopPropagation(); setIsOpen(!isOpen); }}>
                                {hasChildren && (isOpen ? <Icon name="ChevronDown" size={14}/> : <Icon name="ChevronRight" size={14}/>)}
                            </div>
                            <span className="truncate">{node.name} <span className="opacity-50 text-[10px] ml-1">{node.tag}</span></span>
                        </div>
                        {hasChildren && isOpen && (
                            <div>
                                {node.children.map(child => <LayerItem key={child.id} node={child} level={level + 1} />)}
                            </div>
                        )}
                    </div>
                );
            };

            const ControlGroup = ({ title, children }) => (
                <div className="border-b border-gray-800 pb-4 mb-4">
                    <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-1">{title}</h3>
                    <div className="space-y-3 px-1">{children}</div>
                </div>
            );

            const InputControl = ({ label, value, onChange, type = "text", placeholder }) => (
                <div className="flex items-center justify-between">
                    <label className="text-xs text-gray-400 w-1/3">{label}</label>
                    <input 
                        type={type} 
                        value={value || ''} 
                        onChange={(e) => onChange(e.target.value)}
                        placeholder={placeholder}
                        className="w-2/3 bg-gray-900 text-xs text-gray-100 p-1.5 rounded border border-gray-700 focus:border-blue-500 focus:outline-none"
                    />
                </div>
            );

            const SelectControl = ({ label, value, options, onChange }) => (
                <div className="flex items-center justify-between">
                    <label className="text-xs text-gray-400 w-1/3">{label}</label>
                    <select 
                        value={value || ''} 
                        onChange={(e) => onChange(e.target.value)}
                        className="w-2/3 bg-gray-900 text-xs text-gray-100 p-1.5 rounded border border-gray-700 focus:border-blue-500 focus:outline-none"
                    >
                        <option value="">Default</option>
                        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                    </select>
                </div>
            );

            const StyleFourWay = ({ label, stylePrefix, styles }) => (
                <div>
                    <label className="text-xs text-gray-400 block mb-2">{label} (px/rem/%)</label>
                    <div className="grid grid-cols-2 gap-2">
                        <input placeholder="Top" value={styles[`\( {stylePrefix}Top`] || ''} onChange={(e) => handleUpdateStyle(` \){stylePrefix}Top`, e.target.value)} className="bg-gray-900 text-xs p-1.5 border border-gray-700 rounded" />
                        <input placeholder="Right" value={styles[`\( {stylePrefix}Right`] || ''} onChange={(e) => handleUpdateStyle(` \){stylePrefix}Right`, e.target.value)} className="bg-gray-900 text-xs p-1.5 border border-gray-700 rounded" />
                        <input placeholder="Bottom" value={styles[`\( {stylePrefix}Bottom`] || ''} onChange={(e) => handleUpdateStyle(` \){stylePrefix}Bottom`, e.target.value)} className="bg-gray-900 text-xs p-1.5 border border-gray-700 rounded" />
                        <input placeholder="Left" value={styles[`\( {stylePrefix}Left`] || ''} onChange={(e) => handleUpdateStyle(` \){stylePrefix}Left`, e.target.value)} className="bg-gray-900 text-xs p-1.5 border border-gray-700 rounded" />
                    </div>
                </div>
            );

            const getCanvasWidth = () => {
                if (viewMode === 'mobile') return '375px';
                if (viewMode === 'tablet') return '768px';
                return '100%';
            };

            return (
                <div className="flex h-screen bg-[#1e1e1e] text-gray-200 overflow-hidden font-sans">
                    
                    {/* LEFT SIDEBAR (Panels) */}
                    <aside className="w-64 bg-[#252526] border-r border-[#333] flex flex-col">
                        <div className="flex border-b border-[#333]">
                            <button 
                                className={`flex-1 py-3 text-xs font-semibold flex items-center justify-center gap-2 transition ${activeTab === 'add' ? 'text-white border-b-2 border-blue-500 bg-[#2d2d2d]' : 'text-gray-400 hover:text-gray-200'}`}
                                onClick={() => setActiveTab('add')}
                            >
                                <Icon name="Plus" size={14}/> Add
                            </button>
                            <button 
                                className={`flex-1 py-3 text-xs font-semibold flex items-center justify-center gap-2 transition ${activeTab === 'layers' ? 'text-white border-b-2 border-blue-500 bg-[#2d2d2d]' : 'text-gray-400 hover:text-gray-200'}`}
                                onClick={() => setActiveTab('layers')}
                            >
                                <Icon name="Layers" size={14}/> Layers
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            {activeTab === 'add' && (
                                <div className="space-y-4">
                                    <p className="text-xs text-gray-500 italic mb-2">Select an element on canvas to insert into.</p>
                                    {/* New: Search input */}
                                    <input 
                                        type="text" 
                                        placeholder="Search elements..." 
                                        value={elementSearch} 
                                        onChange={(e) => setElementSearch(e.target.value)} 
                                        className="w-full bg-gray-900 text-xs p-2 rounded border border-gray-700 mb-4"
                                    />
                                    <div className="grid grid-cols-2 gap-2">
                                        {filteredElements.map((el, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => handleAddElement(el)}
                                                className="flex flex-col items-center justify-center gap-2 p-3 bg-[#333] hover:bg-[#3f3f46] rounded-md border border-transparent hover:border-blue-500 transition text-xs"
                                            >
                                                <span className="text-blue-400"><Icon name={el.icon} size={18}/></span>
                                                {el.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'layers' && (
                                <div className="pt-2 -mx-4">
                                    <LayerItem node={tree} />
                                </div>
                            )}
                        </div>
                    </aside>

                    {/* CENTER CANVAS AREA */}
                    <main className="flex-1 flex flex-col min-w-0">
                        
                        {/* Top Toolbar (Added undo/redo) */}
                        <header className="h-14 bg-[#252526] border-b border-[#333] flex items-center justify-between px-4 shadow-sm z-10">
                            <div className="flex items-center gap-2">
                                <div className="flex bg-[#1e1e1e] rounded-md p-1 border border-[#333]">
                                    <button onClick={() => setViewMode('desktop')} className={`p-1.5 rounded ${viewMode === 'desktop' ? 'bg-[#3f3f46] text-white' : 'text-gray-400 hover:text-white'}`}><Icon name="Monitor" size={16}/></button>
                                    <button onClick={() => setViewMode('tablet')} className={`p-1.5 rounded ${viewMode === 'tablet' ? 'bg-[#3f3f46] text-white' : 'text-gray-400 hover:text-white'}`}><Icon name="Tablet" size={16}/></button>
                                    <button onClick={() => setViewMode('mobile')} className={`p-1.5 rounded ${viewMode === 'mobile' ? 'bg-[#3f3f46] text-white' : 'text-gray-400 hover:text-white'}`}><Icon name="Smartphone" size={16}/></button>
                                </div>
                                <span className="text-xs text-gray-500 ml-2">{getCanvasWidth()}</span>
                            </div>

                            <div className="flex items-center gap-3">
                                <button onClick={handleUndo} disabled={historyIndex <= 0} className="text-gray-400 hover:text-white p-1" title="Undo"><Icon name="Undo" size={16}/></button>
                                <button onClick={handleRedo} disabled={historyIndex >= history.length - 1} className="text-gray-400 hover:text-white p-1" title="Redo"><Icon name="Redo" size={16}/></button>
                                <button 
                                    onClick={handleDownload}
                                    className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-md text-sm font-medium transition"
                                >
                                    <Icon name="Code" size={16}/> Export HTML
                                </button>
                            </div>
                        </header>

                        {/* Canvas Wrapper */}
                        <div className="flex-1 overflow-auto bg-[#1e1e1e] p-4 flex justify-center custom-scrollbar canvas-container" style={{ backgroundImage: 'radial-gradient(#333 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
                            <div 
                                className="bg-white text-black shadow-2xl transition-all duration-300 relative"
                                style={{ 
                                    width: getCanvasWidth(), 
                                    minHeight: '100%',
                                    margin: viewMode === 'desktop' ? '0' : '0 auto',
                                }}
                            >
                                <CanvasNode node={tree} />
                            </div>
                        </div>
                    </main>

                    {/* RIGHT SIDEBAR (Style Editor - Added name edit, attrs panel, more styles) */}
                    <aside className="w-72 bg-[#252526] border-l border-[#333] flex flex-col overflow-y-auto custom-scrollbar">
                        <div className="p-4 border-b border-[#333] flex items-center justify-between sticky top-0 bg-[#252526] z-10">
                            <div className="flex items-center gap-2">
                                <span className="text-blue-400"><Icon name="Settings2" size={16}/></span>
                                <h2 className="text-sm font-semibold truncate">
                                    {selectedNode.name} <span className="text-gray-500 font-normal text-xs ml-1">#{selectedNode.tag}</span>
                                </h2>
                            </div>
                            {selectedId !== 'root' && (
                                <div className="flex gap-2">
                                    <button onClick={() => handleMove('up')} className="text-gray-400 hover:text-white p-1" title="Move Up"><Icon name="ArrowUp" size={16}/></button>
                                    <button onClick={() => handleMove('down')} className="text-gray-400 hover:text-white p-1" title="Move Down"><Icon name="ArrowDown" size={16}/></button>
                                    <button onClick={handleDelete} className="text-red-400 hover:text-red-300 p-1" title="Delete Element">
                                        <Icon name="Trash2" size={16}/>
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="p-4 space-y-2">
                            
                            {/* BASIC INFO (New: Edit Name) */}
                            <ControlGroup title="Basic">
                                <InputControl label="Name" value={selectedNode.name} onChange={handleUpdateName} placeholder="Element Name" />
                            </ControlGroup>

                            {/* CONTENT EDITING (Updated: only if no children or special tags) */}
                            {selectedNode.children.length === 0 && !['img', 'input', 'textarea'].includes(selectedNode.tag) && selectedNode.id !== 'root' && (
                                <ControlGroup title="Content">
                                    <div className="mb-2">
                                        <label className="text-xs text-gray-400 block mb-1">Text Content</label>
                                        <textarea 
                                            value={selectedNode.content} 
                                            onChange={(e) => handleUpdateContent(e.target.value)}
                                            className="w-full bg-gray-900 text-xs text-gray-100 p-2 rounded border border-gray-700 focus:border-blue-500 focus:outline-none min-h-[60px]"
                                        />
                                    </div>
                                </ControlGroup>
                            )}

                            {/* ATTRIBUTES (New: Edit attrs like src, href, type) */}
                            {Object.keys(selectedNode.attrs).length > 0 && (
                                <ControlGroup title="Attributes">
                                    {Object.entries(selectedNode.attrs).map(([key, value]) => (
                                        <InputControl key={key} label={key.charAt(0).toUpperCase() + key.slice(1)} value={value} onChange={(v) => handleUpdateAttr(key, v)} placeholder={`Enter ${key}`} />
                                    ))}
                                </ControlGroup>
                            )}

                            {/* LAYOUT PANEL */}
                            <ControlGroup title="Layout">
                                <SelectControl 
                                    label="Display" 
                                    value={selectedNode.styles.display} 
                                    onChange={(v) => handleUpdateStyle('display', v)}
                                    options={[
                                        { label: 'Block', value: 'block' },
                                        { label: 'Flex', value: 'flex' },
                                        { label: 'Grid', value: 'grid' },
                                        { label: 'Inline Block', value: 'inline-block' },
                                        { label: 'Inline', value: 'inline' },
                                        { label: 'None', value: 'none' },
                                    ]}
                                />
                                
                                {selectedNode.styles.display === 'flex' && (
                                    <>
                                        <SelectControl 
                                            label="Direction" 
                                            value={selectedNode.styles.flexDirection} 
                                            onChange={(v) => handleUpdateStyle('flexDirection', v)}
                                            options={[ { label: 'Row', value: 'row' }, { label: 'Column', value: 'column' } ]}
                                        />
                                        <SelectControl 
                                            label="Align" 
                                            value={selectedNode.styles.alignItems} 
                                            onChange={(v) => handleUpdateStyle('alignItems', v)}
                                            options={[ { label: 'Start', value: 'flex-start' }, { label: 'Center', value: 'center' }, { label: 'End', value: 'flex-end' }, { label: 'Stretch', value: 'stretch' } ]}
                                        />
                                        <SelectControl 
                                            label="Justify" 
                                            value={selectedNode.styles.justifyContent} 
                                            onChange={(v) => handleUpdateStyle('justifyContent', v)}
                                            options={[ { label: 'Start', value: 'flex-start' }, { label: 'Center', value: 'center' }, { label: 'End', value: 'flex-end' }, { label: 'Space Between', value: 'space-between' } ]}
                                        />
                                        <InputControl label="Gap" value={selectedNode.styles.gap} onChange={(v) => handleUpdateStyle('gap', v)} placeholder="16px" />
                                    </>
                                )}

                                {selectedNode.styles.display === 'grid' && (
                                    <>
                                        <InputControl label="Columns" value={selectedNode.styles.gridTemplateColumns} onChange={(v) => handleUpdateStyle('gridTemplateColumns', v)} placeholder="repeat(2, 1fr)" />
                                        <InputControl label="Gap" value={selectedNode.styles.gap} onChange={(v) => handleUpdateStyle('gap', v)} placeholder="20px" />
                                    </>
                                )}
                            </ControlGroup>

                            {/* SIZING PANEL */}
                            <ControlGroup title="Sizing">
                                 <InputControl label="Width" value={selectedNode.styles.width} onChange={(v) => handleUpdateStyle('width', v)} placeholder="100% or px" />
                                 <InputControl label="Height" value={selectedNode.styles.height} onChange={(v) => handleUpdateStyle('height', v)} placeholder="auto" />
                                 <InputControl label="Min Height" value={selectedNode.styles.minHeight} onChange={(v) => handleUpdateStyle('minHeight', v)} placeholder="e.g. 50px" />
                                 <InputControl label="Max Width" value={selectedNode.styles.maxWidth} onChange={(v) => handleUpdateStyle('maxWidth', v)} placeholder="e.g. 1200px" />
                            </ControlGroup>

                            {/* SPACING PANEL */}
                            <ControlGroup title="Spacing">
                                <StyleFourWay label="Padding (Inner)" stylePrefix="padding" styles={selectedNode.styles} />
                                <div className="h-2"></div>
                                <StyleFourWay label="Margin (Outer)" stylePrefix="margin" styles={selectedNode.styles} />
                            </ControlGroup>

                            {/* TYPOGRAPHY PANEL (Added textTransform) */}
                            <ControlGroup title="Typography">
                                <InputControl label="Font Size" value={selectedNode.styles.fontSize} onChange={(v) => handleUpdateStyle('fontSize', v)} placeholder="16px, 2rem..." />
                                <SelectControl 
                                    label="Weight" 
                                    value={selectedNode.styles.fontWeight} 
                                    onChange={(v) => handleUpdateStyle('fontWeight', v)}
                                    options={[
                                        { label: 'Normal (400)', value: 'normal' },
                                        { label: 'Medium (500)', value: '500' },
                                        { label: 'Semibold (600)', value: '600' },
                                        { label: 'Bold (700)', value: 'bold' },
                                        { label: 'Extra Bold (800)', value: '800' },
                                    ]}
                                />
                                <div className="flex items-center justify-between">
                                     <label className="text-xs text-gray-400 w-1/3">Color</label>
                                     <div className="w-2/3 flex items-center gap-2">
                                         <input type="color" value={selectedNode.styles.color || '#000000'} onChange={(e) => handleUpdateStyle('color', e.target.value)} className="w-6 h-6 p-0 border-0 rounded cursor-pointer" />
                                         <input type="text" value={selectedNode.styles.color || ''} onChange={(e) => handleUpdateStyle('color', e.target.value)} className="flex-1 bg-gray-900 text-xs p-1 rounded border border-gray-700" placeholder="#000" />
                                     </div>
                                </div>
                                <SelectControl 
                                    label="Align" 
                                    value={selectedNode.styles.textAlign} 
                                    onChange={(v) => handleUpdateStyle('textAlign', v)}
                                    options={[ { label: 'Left', value: 'left' }, { label: 'Center', value: 'center' }, { label: 'Right', value: 'right' } ]}
                                />
                                <InputControl label="Line Height" value={selectedNode.styles.lineHeight} onChange={(v) => handleUpdateStyle('lineHeight', v)} placeholder="1.5" />
                                <SelectControl 
                                    label="Transform" 
                                    value={selectedNode.styles.textTransform} 
                                    onChange={(v) => handleUpdateStyle('textTransform', v)}
                                    options={[ { label: 'None', value: 'none' }, { label: 'Uppercase', value: 'uppercase' }, { label: 'Lowercase', value: 'lowercase' }, { label: 'Capitalize', value: 'capitalize' } ]}
                                />
                            </ControlGroup>

                            {/* BACKGROUND PANEL (Added position if image) */}
                            <ControlGroup title="Background">
                                <div className="flex items-center justify-between mb-2">
                                     <label className="text-xs text-gray-400 w-1/3">Color</label>
                                     <div className="w-2/3 flex items-center gap-2">
                                         <input type="color" value={selectedNode.styles.backgroundColor || '#ffffff'} onChange={(e) => handleUpdateStyle('backgroundColor', e.target.value)} className="w-6 h-6 p-0 border-0 rounded cursor-pointer" />
                                         <input type="text" value={selectedNode.styles.backgroundColor || ''} onChange={(e) => handleUpdateStyle('backgroundColor', e.target.value)} className="flex-1 bg-gray-900 text-xs p-1 rounded border border-gray-700" placeholder="#fff or transparent" />
                                     </div>
                                </div>
                                <InputControl label="Image URL" value={selectedNode.styles.backgroundImage?.replace(/url\((.+)\)/, '$1') || ''} onChange={(v) => handleUpdateStyle('backgroundImage', v ? `url(${v})` : '')} placeholder="https://..." />
                                {selectedNode.styles.backgroundImage && (
                                    <>
                                        <SelectControl 
                                            label="Size" 
                                            value={selectedNode.styles.backgroundSize} 
                                            onChange={(v) => handleUpdateStyle('backgroundSize', v)}
                                            options={[ { label: 'Cover', value: 'cover' }, { label: 'Contain', value: 'contain' } ]}
                                        />
                                        <SelectControl 
                                            label="Position" 
                                            value={selectedNode.styles.backgroundPosition} 
                                            onChange={(v) => handleUpdateStyle('backgroundPosition', v)}
                                            options={[ { label: 'Center', value: 'center' }, { label: 'Top', value: 'top' }, { label: 'Bottom', value: 'bottom' } ]}
                                        />
                                    </>
                                )}
                            </ControlGroup>

                            {/* BORDERS PANEL */}
                            <ControlGroup title="Borders">
                                 <InputControl label="Radius" value={selectedNode.styles.borderRadius} onChange={(v) => handleUpdateStyle('borderRadius', v)} placeholder="8px or 50%" />
                                 <InputControl label="Width" value={selectedNode.styles.borderWidth} onChange={(v) => handleUpdateStyle('borderWidth', v)} placeholder="1px" />
                                 <div className="flex items-center justify-between mt-2">
                                     <label className="text-xs text-gray-400 w-1/3">Color</label>
                                     <div className="w-2/3 flex items-center gap-2">
                                         <input type="color" value={selectedNode.styles.borderColor || '#000000'} onChange={(e) => handleUpdateStyle('borderColor', e.target.value)} className="w-6 h-6 p-0 border-0 rounded cursor-pointer" />
                                         <input type="text" value={selectedNode.styles.borderColor || ''} onChange={(e) => handleUpdateStyle('borderColor', e.target.value)} className="flex-1 bg-gray-900 text-xs p-1 rounded border border-gray-700" placeholder="#000" />
                                     </div>
                                </div>
                                <SelectControl 
                                    label="Style" 
                                    value={selectedNode.styles.borderStyle} 
                                    onChange={(v) => handleUpdateStyle('borderStyle', v)}
                                    options={[ { label: 'Solid', value: 'solid' }, { label: 'Dashed', value: 'dashed' }, { label: 'Dotted', value: 'dotted' }, { label: 'None', value: 'none' } ]}
                                />
                            </ControlGroup>

                            {/* EFFECTS PANEL (New: opacity, boxShadow) */}
                            <ControlGroup title="Effects">
                                <InputControl label="Opacity" type="number" value={selectedNode.styles.opacity || '1'} onChange={(v) => handleUpdateStyle('opacity', Math.min(1, Math.max(0, v)))} placeholder="0-1" />
                                <InputControl label="Shadow" value={selectedNode.styles.boxShadow} onChange={(v) => handleUpdateStyle('boxShadow', v)} placeholder="0 4px 6px rgba(0,0,0,0.1)" />
                            </ControlGroup>

                        </div>
                    </aside>
                </div>
            );
        }

        // --- RENDER APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
    </html>
