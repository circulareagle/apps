<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ubora: City of Hustle - Ultra HD Edition</title>
    <style>
        /* ==========================================================================
           CORE STYLES & VARIABLES
           ========================================================================== */
        :root {
            --primary: #f97316; /* Ubora Orange */
            --secondary: #0ea5e9; /* Ubora Blue */
            --dark: #0f172a;
            --light: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevent text selection on mobile */
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-main);
            background-color: #000;
            color: var(--light);
        }

        /* ==========================================================================
           CINEMATIC BACKGROUND SYSTEM
           ========================================================================== */
        #environment-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            background-color: #111; /* Fallback color */
        }

        .bg-layer {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            will-change: transform, opacity;
            /* Cinematic Camera Drift */
            animation: cameraDrift 30s infinite alternate linear;
        }

        .bg-layer.active {
            opacity: 1;
        }

        @keyframes cameraDrift {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.03) translate(-1%, -1%); }
            100% { transform: scale(1.05) translate(1%, 1%); }
        }

        /* Ambient color grading overlay */
        #color-grading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: overlay;
            transition: background 2s ease;
            z-index: 2;
        }

        /* Canvas Physics Overlay (Weather/Particles) */
        #fx-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        /* ==========================================================================
           USER INTERFACE (GLASSMORPHISM)
           ========================================================================== */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none; /* Let clicks pass through to interactive elements */
        }

        /* Top HUD */
        #hud {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        .hud-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-badge {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: var(--transition-smooth);
        }

        .stat-badge.pulse {
            animation: statPulse 0.3s ease;
        }

        @keyframes statPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: brightness(1.5); }
            100% { transform: scale(1); }
        }

        .stat-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        #stat-money { color: var(--success); }
        #stat-energy { color: var(--secondary); }
        #stat-clout { color: var(--primary); }

        .time-display {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 12px;
            text-align: right;
        }

        .time-display h2 {
            font-size: 1.2rem;
            margin-bottom: 2px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-display p {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        /* Bottom Controls Container */
        #controls-container {
            padding: 20px;
            pointer-events: auto;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Location Info */
        #location-header {
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        #location-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        #location-desc {
            font-size: 1rem;
            color: #e2e8f0;
            font-weight: 300;
            max-width: 80%;
        }

        /* Action Buttons Grid */
        #actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 12px;
            border-radius: 16px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }

        .action-btn:active::before {
            left: 150%;
        }

        .action-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .action-btn.disabled:active {
            transform: none;
        }

        .action-cost {
            font-size: 0.75rem;
            color: #cbd5e1;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 10px;
            text-align: center;
        }

        /* Navigation Bar */
        #nav-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none; /* Firefox */
        }
        #nav-bar::-webkit-scrollbar { display: none; } /* Chrome */

        .nav-btn {
            background: var(--dark);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .nav-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        /* ==========================================================================
           OVERLAYS & MODALS
           ========================================================================== */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--dark);
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 30px;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-body {
            font-size: 1rem;
            line-height: 1.5;
            color: #e2e8f0;
            margin-bottom: 25px;
            text-align: center;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:active { background: #ea580c; }

        /* Toast Notifications */
        #toast-container {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 200;
            pointer-events: none;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUpFade 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
                       fadeOut 0.4s ease 2.5s forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Splash Screen */
        #splash-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }
        
        #splash-logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .loader {
            width: 200px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loader-bar {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.2s linear;
        }

        /* ==========================================================================
           MINIGAME CANVAS (DELIVERY DODGE)
           ========================================================================== */
        #minigame-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            z-index: 50;
            display: none;
            flex-direction: column;
        }
        #minigame-hud {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 51;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        #minigame-canvas {
            flex: 1;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        .minigame-close {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: white;
            padding: 10px 30px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            z-index: 51;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* SVG Icons Inline definition */
        .hidden-svgs { display: none; }
    </style>
</head>

                desc: "Seal the deal. High stakes negotiations happen here.",
                color: "rgba(150, 100, 50, 0.3)", // Coffee tones
                weather: 'dust',
                icon: '#icon-handshake',
                actions: [
                    { id: 'pitch', name: 'Pitch to Investor', costE: 40, costM: 0, reqRep: 100, reward: {m: 50000, r: 50, t: 3}, msg: 'They loved the pitch! Secured funding.' },
                    { id: 'bribe', name: 'Buy Coffee for Official', costE: 5, costM: 5000, reward: {r: 25, t: 1}, msg: 'Permits approved faster now.' }
                ]
            },
            boutique: {
                id: 'boutique',
                name: "Ankara Atelier",
                desc: "Look good, feel good, do good business.",
                color: "rgba(255, 100, 100, 0.1)", // Fashion lighting
                weather: 'dust',
                icon: '#icon-shirt',
                actions: [
                    { id: 'buy_suit', name: 'Buy Power Suit', costE: 5, costM: 25000, reward: {r: 150, t: 2}, msg: 'You look like a billion Naira.' },
                    { id: 'collab', name: 'Brand Collab', costE: 20, costM: 5000, reqRep: 200, reward: {m: 10000, r: 80, t: 3}, msg: 'Successful photo shoot!' }
                ]
            },
            lounge: {
                id: 'lounge',
                name: "The VIP Lounge",
                desc: "Relax, network, and spend that hard-earned cash.",
                color: "rgba(50, 0, 100, 0.2)", // Mood lighting
                weather: 'none',
                icon: '#icon-glass',
                actions: [
                    { id: 'party', name: 'Host a Party', costE: 30, costM: 50000, reward: {r: 300, t: 4}, msg: 'The party of the year. Everyone knows your name.' },
                    { id: 'chill', name: 'Chill with Friends', costE: -20, costM: 2000, reward: {e: 50, r: 10, t: 3}, msg: 'Good vibes. Stress relieved.' }
                ]
            },
            office: {
                id: 'office',
                name: "Corporate Heights",
                desc: "The pinnacle. You've made it to the boardroom.",
                color: "rgba(200, 200, 255, 0.1)", // Cool corporate blue
                weather: 'sunrays',
                icon: '#icon-briefcase',
                actions: [
                    { id: 'board_meeting', name: 'Board Meeting', costE: 50, costM: 0, reqRep: 500, reward: {m: 150000, r: 100, t: 4}, msg: 'Dividends distributed. You are a titan.' },
                    { id: 'acquire', name: 'Hostile Takeover', costE: 80, costM: 500000, reqRep: 1000, reward: {m: 1000000, r: 500, t: 8}, msg: 'Competitor acquired. Monopoly secured.' }
                ]
            }
        };

        let STATE = {
            money: 5000,
            energy: 100,
            clout: 10,
            day: 1,
            hour: 8, // 0-23
            inventory: { materials: 0, products: 0 },
            currentLoc: 'apartment'
        };

        // --- 2. CORE ENGINE INITIALIZATION ---

        const UI = {
            money: document.getElementById('stat-money-val'),
            energy: document.getElementById('stat-energy-val'),
            clout: document.getElementById('stat-clout-val'),
            day: document.getElementById('time-day'),
            clock: document.getElementById('time-clock'),
            locTitle: document.getElementById('location-title'),
            locDesc: document.getElementById('location-desc'),
            actionsGrid: document.getElementById('actions-grid'),
            navBar: document.getElementById('nav-bar'),
            envContainer: document.getElementById('environment-container'),
            colorGrading: document.getElementById('color-grading')
        };

        // Format Currency
        const fmtMoney = (val) => '₦' + val.toLocaleString('en-NG');

        // Robust Asset Preloader (Fail-safe)
        function preloadAssets() {
            const bar = document.getElementById('loader-bar');
            const total = Object.keys(ASSETS).length;
            let loaded = 0;

            // FAIL-SAFE: If it takes more than 3 seconds, forcefully start the game.
            // This prevents the infinite loading bug if local paths are blocked by the browser.
            const forceStartTimeout = setTimeout(() => {
                finishLoading();
            }, 3000);

            // Load all images concurrently
            const promises = Object.keys(ASSETS).map(key => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        loaded++;
                        if (bar) bar.style.width = `${(loaded / total) * 100}%`;
                        resolve();
                    };
                    img.onerror = () => {
                        loaded++; // Increment anyway so the bar still moves
                        if (bar) bar.style.width = `${(loaded / total) * 100}%`;
                        console.warn(`Failed to load image: ${ASSETS[key]}. Check file path.`);
                        resolve(); // Resolve even on error so Promise.all completes
                    };
                    img.src = ASSETS[key];
                });
            });

            Promise.all(promises).then(() => {
                clearTimeout(forceStartTimeout); // Cancel the fail-safe if it naturally finished fast
                finishLoading();
            });
        }

        function finishLoading() {
            const splash = document.getElementById('splash-screen');
            if (splash && splash.style.display !== 'none') {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    initGame();
                }, 500);
            }
        }

        // --- 3. RENDERING & UI UPDATES ---

        function updateHUD(animateId = null) {
            UI.money.innerText = fmtMoney(STATE.money);
            UI.energy.innerText = `${STATE.energy}/100`;
            UI.clout.innerText = STATE.clout.toLocaleString();
            
            const period = STATE.hour >= 12 ? 'PM' : 'AM';
            let h = STATE.hour % 12;
            if (h === 0) h = 12;
            UI.clock.innerText = `${h.toString().padStart(2, '0')}:00 ${period}`;
            UI.day.innerText = `DAY ${STATE.day}`;

            if (animateId) {
                const badge = document.getElementById(`badge-${animateId}`);
                if(badge) {
                    badge.classList.remove('pulse');
                    void badge.offsetWidth; // Trigger reflow
                    badge.classList.add('pulse');
                }
            }
        }

        function buildNavigation() {
            UI.navBar.innerHTML = '';
            for (let key in LOCATIONS) {
                const loc = LOCATIONS[key];
                const btn = document.createElement('div');
                btn.className = `nav-btn ${key === STATE.currentLoc ? 'active' : ''}`;
                btn.innerHTML = loc.name; 
                btn.onclick = () => changeLocation(key);
                UI.navBar.appendChild(btn);
            }
        }

        function changeLocation(locId) {
            if (STATE.currentLoc === locId) return;
            STATE.currentLoc = locId;
            const loc = LOCATIONS[locId];

            // 1. Update Cinematic Background
            const oldBg = document.querySelector('.bg-layer.active');
            if (oldBg) oldBg.classList.remove('active');

            let newBg = document.getElementById(`bg-${locId}`);
            if (!newBg) {
                newBg = document.createElement('div');
                newBg.id = `bg-${locId}`;
                newBg.className = 'bg-layer';
                newBg.style.backgroundImage = `url('${ASSETS[locId]}')`;
                UI.envContainer.appendChild(newBg);
            }
            // Small delay to allow CSS transition
            setTimeout(() => {
                if(newBg) newBg.classList.add('active');
            }, 50);

            // 2. Update Color Grading & Weather
            UI.colorGrading.style.background = loc.color;
            currentWeather = loc.weather;
            initWeather();

            // 3. Update Text
            UI.locTitle.innerText = loc.name;
            UI.locDesc.innerText = loc.desc;

            // 4. Update Navigation UI
            buildNavigation();

            // 5. Rebuild Actions
            renderActions();
            
            createParticleBurst(window.innerWidth/2, window.innerHeight/2, '#ffffff', 20);
        }

        function renderActions() {
            UI.actionsGrid.innerHTML = '';
            const loc = LOCATIONS[STATE.currentLoc];

            loc.actions.forEach(action => {
                const btn = document.createElement('div');
                btn.className = 'action-btn';
                
                // Check requirements
                let disabled = false;
                let reqText = '';
                
                if (STATE.energy < action.costE) disabled = true;
                if (STATE.money < action.costM) disabled = true;
                if (action.reqRep && STATE.clout < action.reqRep) {
                    disabled = true;
                    reqText = ` (Req: ${action.reqRep} Rep)`;
                }
                if (action.reqInv && STATE.inventory[action.reqInv] <= 0) {
                    disabled = true;
                    reqText = ` (Req: ${action.reqInv})`;
                }

                if (disabled) btn.classList.add('disabled');

                let costHTML = '';
                if (action.costE > 0) costHTML += `⚡ -${action.costE} <br>`;
                if (action.costE < 0) costHTML += `⚡ +${Math.abs(action.costE)} <br>`;
                if (action.costM > 0) costHTML += `₦ -${fmtMoney(action.costM)} `;

                btn.innerHTML = `
                    <span>${action.name}</span>
                    <span class="action-cost">${costHTML} ${reqText}</span>
                `;

                if (!disabled) {
                    btn.onclick = () => performAction(action);
                }
                
                UI.actionsGrid.appendChild(btn);
            });
        }

        // --- 4. GAME LOGIC ---

        function performAction(action) {
            // Minigame Intercept
            if (action.special === 'minigame') {
                startMinigame(action);
                return;
            }

            // Deduct costs
            if (action.costE > 0) STATE.energy -= action.costE;
            if (action.costM > 0) STATE.money -= action.costM;

            // Apply Rewards
            if (action.reward) {
                if (action.reward.m) {
                    STATE.money += action.reward.m;
                    updateHUD('money');
                    createParticleBurst(100, 50, '#10b981', 30); 
                }
                if (action.reward.e) {
                    STATE.energy = Math.min(100, STATE.energy + action.reward.e);
                    updateHUD('energy');
                }
                if (action.reward.r) {
                    STATE.clout += action.reward.r;
                    updateHUD('clout');
                    createParticleBurst(window.innerWidth - 100, 50, '#f97316', 30); 
                }
                if (action.reward.i) {
                    STATE.inventory[action.reward.i] = (STATE.inventory[action.reward.i] || 0) + 1;
                }
                if (action.reward.t) {
                    advanceTime(action.reward.t);
                }
            }

            // Consume Inventory if required
            if (action.reqInv) {
                STATE.inventory[action.reqInv] -= 1;
            }

            showToast(action.msg);
            updateHUD();
            renderActions(); // Re-evaluate button states
        }

        function advanceTime(hours) {
            STATE.hour += hours;
            if (STATE.hour >= 24) {
                STATE.hour -= 24;
                STATE.day += 1;
                showToast(`Day ${STATE.day} begins... Keep hustling.`);
            }
            // Passive energy regen if not working
            STATE.energy = Math.min(100, STATE.energy + (hours * 2));
        }

        function showToast(msg) {
            const tc = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            tc.appendChild(t);
            setTimeout(() => { if (tc.contains(t)) tc.removeChild(t); }, 3000);
        }

        function showModal(id, title, bodyHTML) {
            if(title) document.getElementById('event-title').innerText = title;
            if(bodyHTML) document.getElementById('event-body').innerHTML = bodyHTML;
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // --- 5. CANVAS PHYSICS ENGINE (Ultra HD Realism Layer) ---
        
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        let particles = [];
        let weatherParticles = [];
        let cw, ch;
        let currentWeather = 'dust'; // 'dust', 'sunrays', 'rain', 'none'

        function resizeCanvas() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
            initWeather();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.02;
                this.color = color;
                this.size = Math.random() * 3 + 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.2; // gravity
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        class WeatherParticle {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * cw;
                this.y = Math.random() * ch;
                
                if (type === 'dust') {
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 2 + 0.5;
                    this.alpha = Math.random() * 0.3 + 0.1;
                } else if (type === 'rain') {
                    this.x = Math.random() * cw;
                    this.y = Math.random() * ch - ch;
                    this.vx = 1 + Math.random();
                    this.vy = 15 + Math.random() * 10;
                    this.size = Math.random() * 1.5 + 0.5;
                    this.length = Math.random() * 20 + 10;
                    this.alpha = Math.random() * 0.4 + 0.2;
                } else if (type === 'sunrays') {
                    this.x = Math.random() * cw;
                    this.y = -50;
                    this.vx = 0.5;
                    this.vy = 0;
                    this.size = Math.random() * 100 + 50;
                    this.length = ch * 1.5;
                    this.alpha = Math.random() * 0.05 + 0.02;
                    this.angle = Math.PI / 4; 
                }
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.type === 'dust') {
                    if (this.x < 0 || this.x > cw) this.vx *= -1;
                    if (this.y < 0 || this.y > ch) this.vy *= -1;
                } else if (this.type === 'rain') {
                    if (this.y > ch) {
                        this.y = -20;
                        this.x = Math.random() * cw;
                    }
                } else if (this.type === 'sunrays') {
                    this.x += Math.sin(Date.now() * 0.0005) * 0.5; 
                }
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                if (this.type === 'dust') {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                } else if (this.type === 'rain') {
                    ctx.strokeStyle = '#a8c0ff';
                    ctx.lineWidth = this.size;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.vx * 2, this.y - this.vy * 2);
                    ctx.stroke();
                } else if (this.type === 'sunrays') {
                    ctx.fillStyle = '#ffeedd';
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillRect(0, 0, this.size, this.length);
                    ctx.restore();
                }
            }
        }

        function initWeather() {
            weatherParticles = [];
            let count = 0;
            if (currentWeather === 'dust') count = 50;
            if (currentWeather === 'rain') count = 200;
            if (currentWeather === 'sunrays') count = 5;

            for(let i=0; i<count; i++) {
                weatherParticles.push(new WeatherParticle(currentWeather));
            }
        }

        function createParticleBurst(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function renderCanvas() {
            ctx.clearRect(0, 0, cw, ch);
            
            // Draw Weather
            for(let i=0; i<weatherParticles.length; i++) {
                weatherParticles[i].update();
                weatherParticles[i].draw();
            }

            // Draw Interaction Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            }

            ctx.globalAlpha = 1.0;
            requestAnimationFrame(renderCanvas);
        }

        // Add touch burst effect anywhere on screen
        document.body.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON' && !e.target.closest('.action-btn')) {
                const touch = e.touches[0];
                createParticleBurst(touch.clientX, touch.clientY, 'rgba(255,255,255,0.5)', 5);
            }
        }, {passive: true});

        document.body.addEventListener('mousedown', (e) => {
            if(e.target.tagName !== 'BUTTON' && !e.target.closest('.action-btn')) {
                createParticleBurst(e.clientX, e.clientY, 'rgba(255,255,255,0.5)', 5);
            }
        });


        // --- 6. MINIGAME LOGIC (Delivery Dodge) ---
        
        let mgActive = false;
        let mgCanvas, mgCtx, mgW, mgH;
        let mgScore = 0;
        let mgSpeed = 5;
        let mgPlayer = {x: 0, y: 0, w: 40, h: 60, targetX: 0};
        let mgObstacles = [];
        let mgRoadLines = [];
        let mgActionRef = null;

        function startMinigame(action) {
            mgActionRef = action;
            document.getElementById('minigame-container').style.display = 'flex';
            mgCanvas = document.getElementById('minigame-canvas');
            mgCtx = mgCanvas.getContext('2d');
            
            mgW = mgCanvas.width = window.innerWidth;
            mgH = mgCanvas.height = window.innerHeight;
            
            mgPlayer.x = mgW / 2 - mgPlayer.w / 2;
            mgPlayer.targetX = mgPlayer.x;
            mgPlayer.y = mgH - 120;
            mgScore = 0;
            mgSpeed = 6;
            mgObstacles = [];
            mgRoadLines = [0, mgH/4, mgH/2, mgH*0.75];
            
            // Deduct costs to start
            STATE.energy -= action.costE;
            STATE.inventory[action.reqInv] -= 1;
            updateHUD();

            mgActive = true;
            
            // Touch handlers for minigame
            mgCanvas.addEventListener('touchmove', handleMgTouch, {passive: false});
            mgCanvas.addEventListener('mousemove', handleMgMouse);
            
            requestAnimationFrame(mgLoop);
        }

        function handleMgTouch(e) {
            e.preventDefault();
            mgPlayer.targetX = e.touches[0].clientX - mgPlayer.w/2;
        }
        function handleMgMouse(e) {
            mgPlayer.targetX = e.clientX - mgPlayer.w/2;
        }

        function endMinigame(success) {
            mgActive = false;
            document.getElementById('minigame-container').style.display = 'none';
            mgCanvas.removeEventListener('touchmove', handleMgTouch);
            mgCanvas.removeEventListener('mousemove', handleMgMouse);
            
            if (success) {
                const earned = mgScore * 100;
                STATE.money += earned;
                STATE.clout += Math.floor(mgScore / 10);
                advanceTime(2);
                showModal('modal-event', 'Delivery Complete!', `You successfully navigated the traffic and earned ₦${fmtMoney(earned)}.`);
            } else {
                showModal('modal-event', 'Delivery Failed', `You crashed or abandoned the run. Goods lost. Keep trying.`);
            }
            updateHUD();
            renderActions();
        }

        function mgLoop() {
            if (!mgActive) return;

            // Clear
            mgCtx.fillStyle = '#222';
            mgCtx.fillRect(0, 0, mgW, mgH);

            // Draw Road
            mgCtx.fillStyle = '#444';
            mgCtx.fillRect(mgW*0.1, 0, mgW*0.8, mgH);
            
            // Road Lines
            mgCtx.fillStyle = '#fff';
            for(let i=0; i<mgRoadLines.length; i++) {
                mgRoadLines[i] += mgSpeed;
                if(mgRoadLines[i] > mgH) mgRoadLines[i] = -100;
                mgCtx.fillRect(mgW/2 - 5, mgRoadLines[i], 10, 60);
            }

            // Update Player
            // Smooth follow
            mgPlayer.x += (mgPlayer.targetX - mgPlayer.x) * 0.2;
            // Clamp to road
            mgPlayer.x = Math.max(mgW*0.1, Math.min(mgPlayer.x, mgW*0.9 - mgPlayer.w));

            // Draw Player (Bike Abstract)
            mgCtx.fillStyle = varColor('--primary', '#f97316');
            mgCtx.beginPath();
            mgCtx.roundRect(mgPlayer.x, mgPlayer.y, mgPlayer.w, mgPlayer.h, 10);
            mgCtx.fill();
            mgCtx.fillStyle = '#fff'; // Helmet
            mgCtx.beginPath(); mgCtx.arc(mgPlayer.x + mgPlayer.w/2, mgPlayer.y + 15, 12, 0, Math.PI*2); mgCtx.fill();

            // Spawn Obstacles (Traffic)
            if (Math.random() < 0.03 + (mgSpeed * 0.002)) {
                mgObstacles.push({
                    x: mgW*0.1 + Math.random() * (mgW*0.8 - 50),
                    y: -100,
                    w: 50,
                    h: 80 + Math.random()*40,
                    color: Math.random() > 0.5 ? '#ef4444' : '#0ea5e9' // Danfo colors abstract
                });
            }

            // Update & Draw Obstacles
            for (let i = mgObstacles.length - 1; i >= 0; i--) {
                let ob = mgObstacles[i];
                ob.y += mgSpeed * 0.8; // Traffic moves slightly slower than relative ground
                
                mgCtx.fillStyle = ob.color;
                mgCtx.fillRect(ob.x, ob.y, ob.w, ob.h);

                // Collision Check
                if (mgPlayer.x < ob.x + ob.w &&
                    mgPlayer.x + mgPlayer.w > ob.x &&
                    mgPlayer.y < ob.y + ob.h &&
                    mgPlayer.h + mgPlayer.y > ob.y) {
                    // Crash!
                    endMinigame(false);
                    return;
                }

                if (ob.y > mgH) {
                    mgObstacles.splice(i, 1);
                    mgScore++;
                    document.getElementById('mg-score').innerText = mgScore;
                    
                    // Increase Difficulty
                    if (mgScore % 10 === 0) {
                        mgSpeed += 1;
                        document.getElementById('mg-speed').innerText = (mgSpeed/6).toFixed(1) + 'x';
                    }
                    
                    // Win condition
                    if (mgScore >= 30) {
                        endMinigame(true);
                        return;
                    }
                }
            }

            requestAnimationFrame(mgLoop);
        }
        
        // Helper to get CSS vars for canvas
        function varColor(name, fallback) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback;
        }

        // --- 7. BOOTSTRAP ---

        function initGame() {
            // First time setup
            buildNavigation();
            
            // Force create a default element if the cinematic loader fails 
            // so we don't error out on changeLocation
            if(!document.getElementById('bg-apartment')) {
               let fallback = document.createElement('div');
               fallback.id = 'bg-apartment';
               fallback.className = 'bg-layer active';
               fallback.style.backgroundImage = `url('${ASSETS['apartment']}')`;
               document.getElementById('environment-container').appendChild(fallback);
            }

            changeLocation('apartment');
            updateHUD();
            
            // Start graphics loop
            renderCanvas();
            
            // Initial Narrative
            setTimeout(() => {
                showModal('modal-event', 'Welcome to Ubora', 
                `The city is yours for the taking. Manage your Energy, Money, and Clout. <br><br>
                Start by checking your ledger, then hit the market to buy materials to fulfill orders.
                The images provided are your world now. Hustle hard.`);
            }, 1000);
        }

        // Start loading
        window.onload = preloadAssets;

    </script>
</body>
