<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MP4 Brute Force Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-8 font-mono">

    <div class="max-w-2xl mx-auto border border-red-900/30 bg-slate-900 rounded-xl shadow-2xl p-8">
        <h1 class="text-xl font-bold text-red-500 mb-2 underline tracking-tighter">DATA RECOVERY MODE: BRUTE FORCE</h1>
        <p class="text-xs text-slate-500 mb-6">Warning: This tool attempts to bypass missing headers by scanning raw binary for video frames.</p>

        <div id="dropZone" class="border-2 border-dashed border-slate-700 p-12 text-center rounded-lg cursor-pointer hover:bg-slate-800 transition">
            <input type="file" id="fileInput" class="hidden">
            <p class="text-sm">DROP TRUNCATED FILE HERE</p>
        </div>

        <div id="results" class="hidden mt-6 space-y-4">
            <div class="bg-black p-4 rounded text-[10px] h-48 overflow-y-auto" id="console">
                <div class="text-blue-400">> Ready for deep scan...</div>
            </div>
            
            <button id="recoverBtn" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded uppercase text-xs">
                Attempt Frame Extraction
            </button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const consoleEl = document.getElementById('console');
        const recoverBtn = document.getElementById('recoverBtn');
        let fileData = null;

        function log(msg, color = 'text-slate-400') {
            const d = document.createElement('div');
            d.className = color;
            d.innerText = `> ${msg}`;
            consoleEl.appendChild(d);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                fileData = new Uint8Array(ev.target.result);
                document.getElementById('results').classList.remove('hidden');
                log("File loaded. Size: " + fileData.length + " bytes.");
                scan();
            };
            reader.readAsArrayBuffer(file);
        };

        function scan() {
            log("Scanning for NAL Start Codes (00 00 00 01)...");
            let framesFound = 0;
            // Scan for H.264 start codes
            for (let i = 0; i < fileData.length - 4; i++) {
                if (fileData[i] === 0 && fileData[i+1] === 0 && fileData[i+2] === 0 && fileData[i+3] === 1) {
                    framesFound++;
                }
            }
            if (framesFound > 0) {
                log(`SUCCESS: Found ${framesFound} potential video data fragments!`, 'text-green-500');
                log("These fragments exist even though the header is missing.", 'text-yellow-500');
            } else {
                log("FAILED: No video data found. The file is empty or encoded differently.", 'text-red-500');
            }
        }

        recoverBtn.onclick = () => {
            log("Creating new container blueprint...");
            // We are going to wrap the raw data into a basic blob and force an AVI extension
            // Sometimes VLC can "guess" the content of an AVI easier than a broken MP4
            const blob = new Blob([fileData], {type: 'video/x-msvideo'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "RECOVERED_RAW_DATA.avi";
            a.click();
            log("Downloaded as .AVI. IMPORTANT: Open this file with VLC MEDIA PLAYER.", "text-white font-bold");
        };
    </script>
</body>
</html>
