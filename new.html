<!DOCTYPE html>
<html>
<head>
    <title>Professional Video Header Rebuilder</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen p-8 font-sans">
    <div class="max-w-xl mx-auto bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl">
        <h1 class="text-2xl font-bold text-white mb-2">VLC-Style Re-Indexer</h1>
        <p class="text-sm text-zinc-500 mb-6">This tool uses FFmpeg to rebuild the duration header from scratch. No data leaves your browser.</p>

        <div id="dropZone" class="border-2 border-dashed border-zinc-700 rounded-xl p-12 text-center hover:border-blue-500 cursor-pointer transition-all">
            <input type="file" id="fileInput" class="hidden" accept="video/mp4">
            <p id="statusText">Drop your "0:00" MP4 here</p>
        </div>

        <div id="progressContainer" class="hidden mt-6">
            <div class="w-full bg-zinc-800 rounded-full h-2">
                <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all" style="width: 0%"></div>
            </div>
            <p id="log" class="text-[10px] font-mono mt-4 text-zinc-400 bg-black p-3 rounded h-32 overflow-y-auto"></p>
        </div>

        <button id="startBtn" class="hidden w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg transition-all">
            Rebuild Duration Header
        </button>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const startBtn = document.getElementById('startBtn');
        const logEl = document.getElementById('log');

        function updateLog(msg) {
            const div = document.createElement('div');
            div.innerText = msg;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('statusText').innerText = `Selected: ${file.name}`;
            startBtn.classList.remove('hidden');
            document.getElementById('progressContainer').classList.remove('hidden');
        };

        startBtn.onclick = async () => {
            startBtn.disabled = true;
            startBtn.innerText = "Processing...";
            updateLog("Loading FFmpeg engine...");

            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            const file = fileInput.files[0];
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

            updateLog("Rebuilding stream index (Copying codecs)...");

            // This specific command (-copyts -report) fixes duration issues
            // without losing quality (stream copy)
            await ffmpeg.run('-i', 'input.mp4', '-c', 'copy', '-map', '0', '-movflags', 'faststart', 'output.mp4');

            updateLog("Header rebuilt! Finalizing download...");

            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "FIXED_" + file.name;
            a.click();
            
            startBtn.innerText = "Done!";
            updateLog("Success: Duration should now be visible.");
        };

        ffmpeg.setProgress(({ ratio }) => {
            document.getElementById('progressBar').style.width = (ratio * 100) + '%';
        });
    </script>
</body>
</html>
